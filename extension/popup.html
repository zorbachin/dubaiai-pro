<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Offer Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0a0f2c; --navy-mid: #111836; --navy-light: #1a2456;
      --gold: #c9a84c; --gold-light: #e2c06e;
      --white: #fff; --gray-100: #f4f5f8; --gray-200: #e8eaf0;
      --gray-400: #9399b0; --gray-600: #5a6080;
      --green: #22c55e; --amber: #f59e0b; --red: #ef4444;
      --radius: 10px; --radius-sm: 7px;
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--gray-100);
      color: var(--navy);
      width: 400px;
      min-height: 500px;
      max-height: 600px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      font-size: 13px;
    }

    /* Header */
    .header {
      background: var(--navy);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .header-title { font-size: 14px; font-weight: 700; color: #fff; }
    .header-title span { color: var(--gold); }
    .header-bank-badge {
      margin-left: auto;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 12px;
      background: rgba(201,168,76,0.2);
      color: var(--gold);
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: var(--navy-mid);
      flex-shrink: 0;
    }
    .tab {
      flex: 1;
      padding: 9px 4px;
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      color: var(--gray-400);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
      user-select: none;
    }
    .tab.active { color: var(--gold); border-bottom-color: var(--gold); }
    .tab-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--red);
      color: #fff;
      border-radius: 8px;
      font-size: 9px;
      font-weight: 700;
      min-width: 14px;
      height: 14px;
      padding: 0 3px;
      margin-left: 3px;
      vertical-align: middle;
    }

    /* Content */
    .content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-primary { background: var(--gold); color: var(--navy); }
    .btn-primary:hover { background: var(--gold-light); }
    .btn-ghost { background: transparent; color: var(--gold); border: 1px solid var(--gold); }
    .btn-ghost:hover { background: rgba(201,168,76,0.1); }
    .btn-danger { background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
    .btn-sm { padding: 4px 8px; font-size: 11px; }
    .btn-full { width: 100%; justify-content: center; }
    .btn-icon {
      background: none; border: none; cursor: pointer;
      color: var(--gray-400); font-size: 13px;
      padding: 3px; border-radius: 4px; line-height: 1;
      transition: color 0.15s;
    }
    .btn-icon:hover { color: var(--navy); }
    .btn-icon.danger:hover { color: var(--red); }

    /* ── IMPORT TAB ── */
    .import-panel { padding: 12px; }

    .import-status {
      background: var(--white);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 10px;
      text-align: center;
    }
    .import-status-icon { font-size: 24px; margin-bottom: 6px; }
    .import-status-title { font-size: 13px; font-weight: 700; color: var(--navy); margin-bottom: 3px; }
    .import-status-sub { font-size: 12px; color: var(--gray-400); }

    .import-card-select {
      margin-bottom: 10px;
    }
    .form-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.05em; color: var(--gray-600); margin-bottom: 4px;
      display: block;
    }
    .form-select, .form-input {
      width: 100%; padding: 7px 10px;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-sm);
      font-size: 13px; font-family: inherit;
      color: var(--navy); background: var(--white);
    }
    .form-select:focus, .form-input:focus {
      outline: none; border-color: var(--gold);
    }

    .detected-offers { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
    .detected-offer {
      background: var(--white);
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      display: flex;
      gap: 8px;
      align-items: flex-start;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .detected-offer.selected { border-color: var(--gold); }
    .detected-offer-check {
      flex-shrink: 0;
      width: 16px; height: 16px;
      border-radius: 4px;
      border: 2px solid var(--gray-200);
      margin-top: 1px;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px;
      transition: all 0.15s;
    }
    .detected-offer.selected .detected-offer-check {
      background: var(--gold); border-color: var(--gold); color: var(--navy);
    }
    .detected-offer-info { flex: 1; min-width: 0; }
    .detected-offer-merchant { font-size: 13px; font-weight: 600; color: var(--navy); }
    .detected-offer-value { font-size: 12px; color: var(--green); font-weight: 600; }
    .detected-offer-detail { font-size: 11px; color: var(--gray-400); margin-top: 1px; }
    .detected-offer-activated {
      font-size: 10px; font-weight: 700;
      padding: 2px 6px; border-radius: 10px;
      background: rgba(34,197,94,0.1); color: #16a34a;
    }
    .detected-offer-raw {
      font-size: 10px; color: var(--gray-400);
      margin-top: 4px;
      max-height: 36px; overflow: hidden;
      font-style: italic;
    }

    .no-offers {
      text-align: center; padding: 20px; color: var(--gray-400);
    }
    .no-offers-icon { font-size: 24px; margin-bottom: 6px; }

    /* ── CARDS TAB ── */
    .cards-panel { padding: 10px; display: flex; flex-direction: column; gap: 8px; }

    .card-widget {
      background: var(--white);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--gray-200);
    }
    .card-header {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px; cursor: pointer; user-select: none;
    }
    .card-chip {
      width: 32px; height: 22px; border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; flex-shrink: 0;
    }
    .card-meta { flex: 1; min-width: 0; }
    .card-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-sub { font-size: 11px; color: var(--gray-400); }
    .badge {
      font-size: 10px; font-weight: 600;
      padding: 2px 6px; border-radius: 10px;
    }
    .badge-green { background: rgba(34,197,94,0.1); color: #16a34a; }
    .badge-gray { background: var(--gray-200); color: var(--gray-600); }

    .card-body { border-top: 1px solid var(--gray-100); display: none; }
    .card-body.open { display: block; }

    .offer-row {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 12px;
      border-bottom: 1px solid var(--gray-100);
    }
    .offer-row:last-child { border-bottom: none; }
    .offer-toggle {
      flex-shrink: 0; width: 32px; height: 18px;
      background: var(--gray-200); border-radius: 9px;
      position: relative; cursor: pointer; border: none;
      transition: background 0.2s; padding: 0;
    }
    .offer-toggle::after {
      content: ''; position: absolute;
      left: 2px; top: 2px;
      width: 14px; height: 14px;
      background: var(--white); border-radius: 50%;
      transition: left 0.2s; box-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }
    .offer-toggle.on { background: var(--green); }
    .offer-toggle.on::after { left: 16px; }
    .offer-info { flex: 1; min-width: 0; }
    .offer-merchant { font-size: 12px; font-weight: 600; }
    .offer-detail { font-size: 11px; color: var(--gray-400); }
    .offer-val { font-size: 12px; font-weight: 700; color: var(--green); white-space: nowrap; }
    .offer-val.boost { color: var(--gold); }
    .offer-expiry-warn { color: var(--amber); }
    .offer-expiry-expired { color: var(--red); }

    .card-footer {
      padding: 8px 12px; border-top: 1px solid var(--gray-100);
      background: var(--gray-100); display: flex; gap: 6px;
    }

    /* ── OPTIMIZER TAB ── */
    .optimizer-panel { padding: 10px; }

    .opt-form { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
    .opt-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .results { display: flex; flex-direction: column; gap: 6px; }
    .result-item {
      background: var(--white);
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      display: flex; align-items: center; gap: 10px;
    }
    .result-item.best { border-color: var(--gold); }
    .result-rank {
      width: 24px; height: 24px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; flex-shrink: 0;
    }
    .rank-1 { background: var(--gold); color: var(--navy); }
    .rank-2 { background: var(--gray-200); color: var(--navy); }
    .rank-other { background: var(--gray-100); color: var(--gray-400); }
    .result-chip {
      width: 28px; height: 20px; border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; flex-shrink: 0;
    }
    .result-info { flex: 1; min-width: 0; }
    .result-name { font-size: 12px; font-weight: 600; }
    .result-breakdown { font-size: 11px; color: var(--gray-400); margin-top: 1px; }
    .result-breakdown .s { color: var(--green); }
    .result-breakdown .r { color: var(--gold); }
    .result-price { text-align: right; flex-shrink: 0; }
    .result-final { font-size: 15px; font-weight: 700; }
    .result-save { font-size: 11px; color: var(--green); font-weight: 600; }
    .result-nosave { font-size: 11px; color: var(--gray-400); }

    /* ── Shopping site banner ── */
    .shopping-banner {
      background: linear-gradient(135deg, var(--navy-mid), var(--navy-light));
      display: none;
      flex-shrink: 0;
    }
    .shopping-banner-inner {
      padding: 10px 14px;
      display: flex; align-items: center; gap: 10px;
    }
    .shopping-banner-left { flex: 1; min-width: 0; }
    .shopping-banner-site { font-size: 13px; font-weight: 700; color: var(--white); }
    .shopping-banner-cat { font-size: 11px; color: var(--gray-400); }
    .shopping-banner-card {
      display: flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.08);
      padding: 5px 8px; border-radius: 8px;
    }
    .shopping-chip {
      width: 24px; height: 16px; border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; flex-shrink: 0;
    }
    .shopping-card-name { font-size: 11px; font-weight: 600; color: var(--white); white-space: nowrap; }
    .shopping-card-rate { font-size: 10px; color: var(--gold); }

    /* ── Section helpers ── */
    .section-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px;
    }
    .section-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.07em; color: var(--gray-600);
    }

    /* ── Modals ── */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(10,15,44,0.5);
      z-index: 50; display: none;
      align-items: center; justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal-box {
      background: var(--white);
      border-radius: var(--radius);
      width: 370px; max-height: 560px;
      overflow-y: auto;
      box-shadow: 0 8px 40px rgba(10,15,44,0.25);
    }
    .modal-header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--gray-200);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-title { font-size: 14px; font-weight: 700; }
    .modal-close {
      background: none; border: none; font-size: 18px;
      cursor: pointer; color: var(--gray-400); line-height: 1;
    }
    .modal-body {
      padding: 14px 16px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .modal-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--gray-200);
      display: flex; justify-content: flex-end; gap: 8px;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group.span2 { grid-column: span 2; }

    /* Color picker */
    .color-picker { display: flex; gap: 6px; flex-wrap: wrap; }
    .color-swatch {
      width: 22px; height: 22px; border-radius: 50%;
      cursor: pointer; border: 2px solid transparent;
      transition: transform 0.1s;
    }
    .color-swatch.selected { border-color: var(--navy); transform: scale(1.2); }

    /* Toggle in modal */
    .toggle-row {
      display: flex; align-items: center; gap: 8px;
    }

    /* Toast */
    .toast-container {
      position: fixed; bottom: 8px; right: 8px;
      z-index: 100; display: flex; flex-direction: column; gap: 6px;
    }
    .toast {
      background: var(--navy); color: #fff;
      padding: 8px 12px; border-radius: var(--radius-sm);
      font-size: 12px; font-weight: 500;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      animation: tIn 0.2s ease;
    }
    .toast.success { border-left: 3px solid var(--green); }
    .toast.error { border-left: 3px solid var(--red); }
    @keyframes tIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* Multiplier mini-grid */
    .mult-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 5px;
    }
    .mult-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--gray-600);
    }
    .mult-input {
      width: 44px; padding: 3px 6px;
      border: 1.5px solid var(--gray-200); border-radius: 5px;
      font-size: 12px; text-align: center; font-family: inherit;
      color: var(--navy);
    }
    .mult-input:focus { outline: none; border-color: var(--gold); }

    /* Checkbox pills */
    .pill-group { display: flex; flex-wrap: wrap; gap: 4px; }
    .pill {
      display: inline-flex; align-items: center;
      padding: 3px 8px;
      border: 1.5px solid var(--gray-200);
      border-radius: 12px; font-size: 11px;
      cursor: pointer; user-select: none;
      color: var(--gray-600); transition: all 0.15s;
    }
    .pill input { display: none; }
    .pill.checked { border-color: var(--navy); background: var(--navy); color: #fff; }

    .divider {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--gray-400);
      border-bottom: 1px solid var(--gray-200);
      padding-bottom: 4px;
    }

    .empty { text-align: center; padding: 20px; color: var(--gray-400); }
    .empty-icon { font-size: 22px; margin-bottom: 6px; }
  </style>
</head>
<body>

<div class="header">
  <span>💳</span>
  <span class="header-title">Card <span>Tracker</span></span>
  <span class="header-bank-badge" id="bankBadge" style="display:none"></span>
</div>

<div class="shopping-banner" id="shoppingBanner"></div>

<div class="tabs">
  <div class="tab active" data-tab="import" onclick="switchTab('import')">
    Import Offers <span class="tab-badge" id="importBadge" style="display:none">0</span>
  </div>
  <div class="tab" data-tab="cards" onclick="switchTab('cards')">My Cards</div>
  <div class="tab" data-tab="optimizer" onclick="switchTab('optimizer')">Optimizer</div>
</div>

<div class="content">

  <!-- IMPORT TAB -->
  <div class="tab-panel active" id="panel-import">
    <div class="import-panel">
      <div class="import-status" id="importStatus">
        <div class="import-status-icon">🔍</div>
        <div class="import-status-title">Navigate to your bank's offers page</div>
        <div class="import-status-sub">Go to Amex, Chase, Capital One, or Citi offers in this browser tab, then click "Scan Page"</div>
      </div>

      <div class="import-card-select">
        <label class="form-label">Import offers to:</label>
        <select class="form-select" id="importTargetCard"></select>
      </div>

      <button class="btn btn-primary btn-full" id="scanBtn" onclick="scanPage()" style="margin-bottom:10px">
        🔍 Scan Current Page
      </button>

      <div id="detectedOffersSection" style="display:none">
        <div class="section-row">
          <span class="section-title" id="detectedCount">Detected offers</span>
          <div style="display:flex;gap:6px">
            <button class="btn btn-ghost btn-sm" onclick="selectAllOffers()">Select All</button>
            <button class="btn btn-primary btn-sm" onclick="importSelected()">Import Selected</button>
          </div>
        </div>
        <div class="detected-offers" id="detectedOffersList"></div>
      </div>
    </div>
  </div>

  <!-- CARDS TAB -->
  <div class="tab-panel" id="panel-cards">
    <div class="cards-panel">
      <div class="section-row">
        <span class="section-title">My Cards</span>
        <div style="display:flex;gap:5px">
          <button class="btn btn-ghost btn-sm" onclick="importData()" title="Import JSON">↑</button>
          <button class="btn btn-ghost btn-sm" onclick="exportData()" title="Export JSON">↓</button>
          <button class="btn btn-primary btn-sm" onclick="openCardModal()">+ Card</button>
        </div>
      </div>
      <div id="cardsContainer"></div>
    </div>
  </div>

  <!-- OPTIMIZER TAB -->
  <div class="tab-panel" id="panel-optimizer">
    <div class="optimizer-panel">
      <div class="opt-form">
        <div class="form-group">
          <label class="form-label">Merchant</label>
          <input class="form-input" id="optMerchant" placeholder="e.g. Amazon, Delta…">
        </div>
        <div class="opt-row">
          <div class="form-group">
            <label class="form-label">Category</label>
            <select class="form-select" id="optCategory"></select>
          </div>
          <div class="form-group">
            <label class="form-label">Amount ($)</label>
            <input class="form-input" id="optAmount" type="number" min="0" step="0.01" placeholder="0.00">
          </div>
        </div>
        <button class="btn btn-primary btn-full" onclick="runOptimizer()">✦ Find Best Card</button>
      </div>
      <div id="optimizerResults"></div>
    </div>
  </div>

</div>

<!-- Card Modal -->
<div class="modal-backdrop" id="cardModal">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="cardModalTitle">Add Card</span>
      <button class="modal-close" onclick="closeCardModal()">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="cardId">
      <div class="form-row">
        <div class="form-group span2">
          <label class="form-label">Card Name</label>
          <input class="form-input" id="cardName" placeholder="e.g. Delta Platinum Amex">
        </div>
        <div class="form-group">
          <label class="form-label">Issuer</label>
          <input class="form-input" id="cardIssuer" placeholder="Amex">
        </div>
        <div class="form-group">
          <label class="form-label">Last 4 (optional)</label>
          <input class="form-input" id="cardLastFour" maxlength="4" placeholder="1234">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Color</label>
        <div class="color-picker" id="colorPicker"></div>
      </div>
      <div class="divider">Rewards</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Type</label>
          <select class="form-select" id="cardRewardType" onchange="togglePointVal()">
            <option value="cashback">Cashback %</option>
            <option value="points">Points</option>
            <option value="miles">Miles</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Base Rate</label>
          <input class="form-input" id="cardBaseRate" type="number" min="0" step="0.1" placeholder="1">
        </div>
        <div class="form-group span2" id="pointValGroup" style="display:none">
          <label class="form-label">$ value per point/mile</label>
          <input class="form-input" id="cardPointValue" type="number" step="0.001" placeholder="0.015">
        </div>
      </div>
      <div class="divider">Category Multipliers</div>
      <div class="mult-grid" id="multGrid"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeCardModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveCard()">Save</button>
    </div>
  </div>
</div>

<!-- Offer Modal -->
<div class="modal-backdrop" id="offerModal">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="offerModalTitle">Add Offer</span>
      <button class="modal-close" onclick="closeOfferModal()">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="offerCardId">
      <input type="hidden" id="offerId">
      <div class="form-row">
        <div class="form-group span2">
          <label class="form-label">Merchant (blank = any)</label>
          <input class="form-input" id="offerMerchant" placeholder="e.g. Delta, Amazon…">
        </div>
        <div class="form-group">
          <label class="form-label">Type</label>
          <select class="form-select" id="offerType">
            <option value="percent_off">% Off</option>
            <option value="fixed_off">$ Off</option>
            <option value="cashback_boost">Cashback Boost %</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Value</label>
          <input class="form-input" id="offerValue" type="number" min="0" step="0.01" placeholder="10">
        </div>
        <div class="form-group">
          <label class="form-label">Min Spend ($)</label>
          <input class="form-input" id="offerMinSpend" type="number" min="0" placeholder="0">
        </div>
        <div class="form-group">
          <label class="form-label">Max Discount ($)</label>
          <input class="form-input" id="offerMaxDiscount" type="number" min="0" placeholder="No cap">
        </div>
        <div class="form-group span2">
          <label class="form-label">Expiry Date</label>
          <input class="form-input" id="offerExpiry" type="date">
        </div>
        <div class="form-group span2">
          <label class="form-label">Notes</label>
          <input class="form-input" id="offerNotes" placeholder="e.g. Use code, statement credit…">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Categories (blank = all)</label>
        <div class="pill-group" id="offerCatPills"></div>
      </div>
      <div class="toggle-row">
        <button class="offer-toggle" id="offerActivatedToggle" onclick="flipActivated()"></button>
        <span id="offerActivatedLabel" style="font-size:12px;font-weight:600">Activated</span>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeOfferModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveOffer()">Save</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="popup.js"></script>
</body>
</html>
