<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a1226">
<meta name="description" content="Miklat Games — free browser games that work in the shelter with zero signal. No download, no ads. משחקים חינמיים שעובדים בממ״ד בלי קליטה.">
<meta property="og:type" content="website">
<meta property="og:title" content="Miklat Games · משחקים למקלט">
<meta property="og:description" content="Free games that work in the shelter with zero signal. No download, no ads. משחקים חינמיים שעובדים בממ״ד בלי קליטה.">
<meta property="og:url" content="https://miklatgames.fun/">
<meta property="og:image" content="https://miklatgames.fun/irondome/share-card.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:locale" content="he_IL">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Miklat Games · משחקים למקלט">
<meta name="twitter:image" content="https://miklatgames.fun/irondome/share-card.jpg">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="irondome/icon-192.png">
<link rel="apple-touch-icon" href="irondome/icon-192.png">
<title>Miklat Games · משחקים למקלט</title>
<style>
  :root{
    --bg:#0a1226; --panel:#101b38; --panel2:#16244a;
    --cyan:#3ee6ff; --gold:#ffd166; --red:#ff5d73; --green:#5dffa8;
    --ink:#eaf2ff; --dim:#8da3cc;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    background:radial-gradient(ellipse at 50% 0%,#14224a,var(--bg) 60%) var(--bg);
    color:var(--ink);min-height:100vh;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Heebo",Arial,sans-serif;
  }
  header{position:relative;text-align:center;padding:calc(env(safe-area-inset-top,0px) + 34px) 20px 10px;overflow:hidden}
  /* the honeycomb dome arc — the umbrella-brand mark sheltering the page */
  .dome{position:absolute;left:50%;top:0;transform:translateX(-50%);width:min(150vw,900px);height:100%;
    pointer-events:none;opacity:.5}
  h1{
    font-family:"Courier New",monospace;font-weight:700;letter-spacing:3px;
    font-size:clamp(30px,8vw,52px);color:var(--cyan);
    text-shadow:0 0 18px rgba(62,230,255,.8),0 0 60px rgba(62,230,255,.35);
    position:relative;
  }
  .sub{font-size:clamp(17px,4.5vw,24px);color:var(--gold);font-weight:700;margin-top:4px;
    text-shadow:0 0 14px rgba(255,209,102,.5);position:relative}
  .promise{color:var(--dim);font-size:14px;max-width:430px;margin:10px auto 0;line-height:1.5;position:relative}
  #langBtn{
    position:absolute;top:calc(env(safe-area-inset-top,0px) + 10px);inset-inline-end:14px;
    background:var(--panel2);border:1px solid rgba(141,163,204,.4);color:var(--ink);
    border-radius:999px;padding:9px 16px;min-height:44px;min-width:44px;font-size:13px;font-weight:700;cursor:pointer;z-index:2;
  }
  #langBtn:focus-visible,a:focus-visible,button:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
  main{max-width:520px;margin:0 auto;padding:8px 16px 30px;display:flex;flex-direction:column;gap:16px}
  #challenge{display:none;background:var(--panel2);border:1px solid rgba(255,209,102,.55);border-radius:12px;
    padding:12px 16px;color:var(--gold);font-weight:700;font-size:14px;text-align:center}
  .card{
    background:var(--panel);border:1px solid rgba(62,230,255,.25);border-radius:16px;overflow:hidden;
    box-shadow:0 4px 24px rgba(0,0,0,.35);
  }
  .cover{width:100%;aspect-ratio:1200/630;object-fit:cover;display:block;background:var(--panel2)}
  .cover-css{width:100%;aspect-ratio:1200/630;display:flex;align-items:center;justify-content:center;
    font-size:54px;letter-spacing:4px;
    background:linear-gradient(135deg,#1d3557 0%,#2a9d8f 55%,#e76f51 130%)}
  .cbody{padding:14px 16px 16px;text-align:start}
  .cbody h2{font-family:"Courier New",monospace;font-size:20px;color:var(--ink);letter-spacing:1px}
  .cbody .he{color:var(--gold);font-size:15px;font-weight:700;margin-top:2px}
  .hook{color:var(--dim);font-size:14px;line-height:1.45;margin:8px 0 12px}
  .play{
    display:flex;align-items:center;justify-content:center;width:100%;min-height:50px;
    background:linear-gradient(180deg,#0fb3cf,#0b7e98);color:#04121f;text-decoration:none;
    border:1px solid var(--cyan);border-radius:13px;font-size:18px;font-weight:800;letter-spacing:1px;
    box-shadow:0 0 22px rgba(62,230,255,.45);transition:transform .08s;
  }
  .play:active{transform:scale(.96)}
  .ghost{border:1.5px dashed rgba(141,163,204,.45);background:transparent;box-shadow:none}
  .ghost .cbody{opacity:.75;text-align:center}
  .notify{
    display:inline-flex;align-items:center;justify-content:center;min-height:44px;margin-top:8px;
    background:var(--panel2);border:1px solid rgba(93,255,168,.5);color:var(--green);
    border-radius:12px;padding:10px 20px;font-size:14px;font-weight:700;text-decoration:none;
  }
  .safety{
    background:rgba(16,27,56,.7);border:1px solid rgba(141,163,204,.3);border-radius:14px;
    padding:14px 16px;font-size:13px;color:var(--dim);line-height:1.6;text-align:start;
  }
  .safety b{color:var(--ink)}
  #shareBtn{
    width:100%;min-height:50px;background:linear-gradient(180deg,#1d3a7a,#142a5c);color:var(--ink);
    border:1px solid rgba(62,230,255,.5);border-radius:13px;font-size:16px;font-weight:700;cursor:pointer;
    box-shadow:0 0 18px rgba(62,230,255,.25);
  }
  footer{text-align:center;color:var(--dim);opacity:.65;font-size:11px;letter-spacing:1px;
    padding:6px 0 calc(env(safe-area-inset-bottom,0px) + 18px)}
  @media (prefers-reduced-motion: no-preference){
    h1{animation:pulse 4s ease-in-out infinite}
    @keyframes pulse{50%{text-shadow:0 0 26px rgba(62,230,255,1),0 0 80px rgba(62,230,255,.45)}}
  }
</style>
</head>
<body>

<header>
  <svg class="dome" viewBox="0 0 900 320" aria-hidden="true">
    <defs><pattern id="hex" width="42" height="36.4" patternUnits="userSpaceOnUse">
      <polygon points="21,0 42,10.5 42,25.9 21,36.4 0,25.9 0,10.5" fill="none" stroke="rgba(62,230,255,0.10)" stroke-width="1"/>
    </pattern></defs>
    <path d="M 30 320 A 420 420 0 0 1 870 320" fill="url(#hex)" stroke="rgba(62,230,255,0.45)" stroke-width="2.5"/>
  </svg>
  <button id="langBtn" aria-pressed="false">עב</button>
  <h1>🛡 MIKLAT GAMES</h1>
  <div class="sub" id="tSub">משחקים למקלט</div>
  <p class="promise" id="tPromise"></p>
</header>

<main>
  <div id="challenge" role="status"></div>
  <div id="cards"></div>
  <p class="safety" id="tSafety"></p>
  <button id="shareBtn"></button>
</main>

<footer>miklatgames.fun · made in a miklat · 2026</footer>

<script>
'use strict';
/* TODO (Zorba): claim site code `miklatgames` at goatcounter.com to activate analytics */
const $ = id => document.getElementById(id);
const INBOUND = new URLSearchParams(location.search);
const REF = INBOUND.get('ref') || '';

const I18N = {
  en: {
    sub: 'משחקים למקלט',
    promise: 'Free browser games that work in the shelter — no signal, no download, no ads.',
    safety: '<b>Built for morale.</b> Open a game once with internet — after that it works with zero signal. Free forever, no ads, no sign-up, nothing to install. <b>During a real alert, follow Home Front Command instructions only.</b>',
    share: '📤 Send to the family group',
    shared: '✓ Sent!',
    shareTxt: 'Free games that work in the shelter with zero signal — for the kids (and us). 🛡',
    play: 'PLAY ▶',
    soon: 'More games loading…',
    notify: '🔔 Tell me when new games drop',
    challenge: 'Someone challenged you: beat {b} in {c} 🎯',
    games: [
      { hook: 'Tap the rockets out of the sky. 10 cities, Sderot to Eilat.' },
      { hook: 'Hustle Tel Aviv between the sirens.' }
    ]
  },
  he: {
    sub: 'GAMES FOR THE MIKLAT',
    promise: 'משחקי דפדפן חינמיים שעובדים בממ״ד — בלי קליטה, בלי הורדה, בלי פרסומות.',
    safety: '<b>נבנה בשביל המורל.</b> פותחים משחק פעם אחת עם אינטרנט — ומאז הוא עובד גם בלי קליטה. חינם לתמיד, בלי פרסומות, בלי הרשמה, בלי התקנות. <b>באזעקה אמיתית פועלים רק לפי הנחיות פיקוד העורף.</b>',
    share: '📤 שלחו לקבוצה של המשפחה',
    shared: '✓ נשלח!',
    shareTxt: 'משחקים חינמיים שעובדים בממ״ד בלי קליטה — בשביל הילדים (וגם בשבילנו). 🛡',
    play: 'שחקו ▶',
    soon: 'עוד משחקים בדרך…',
    notify: '🔔 ספרו לי כשיוצא משחק חדש',
    challenge: 'מישהו מאתגר אתכם: תעברו {b} ב{c} 🎯',
    games: [
      { hook: 'מיירטים רקטות עם האצבע. עשרה שלבים משדרות ועד אילת.' },
      { hook: 'לעשות חיים בתל אביב בין האזעקות.' }
    ]
  }
};

const GAMES = [
  { id: 'irondome', title: 'IRON DOME', he: 'כיפת ברזל',
    cover: 'irondome/share-card.jpg', href: 'irondome/', players: null, event: 'play-irondome' },
  { id: 'mamadio', title: 'MAMAD DASH', he: 'מקלט דאש',
    cover: null, coverEmoji: '🏃💨', href: 'mamadio/', players: null, event: 'play-mamadio' }
];

let lang = localStorage.getItem('miklat.lang') || 'en';   // English-first; עב one tap away

function track(event){
  try{
    if (location.protocol === 'file:' || location.hostname === 'localhost') return;
    const img = new Image(1, 1);
    img.src = 'https://miklatgames.goatcounter.com/count?' +
      'p=' + encodeURIComponent(event ? '/' + event : location.pathname) +
      (event ? '&e=true' : '') +
      '&r=' + encodeURIComponent(REF ? 'share:' + REF : document.referrer) +
      '&rnd=' + Date.now();
  }catch(e){}
}

/* pass inbound challenge/ref params through to game links */
function gameHref(g){
  const q = new URLSearchParams(INBOUND);
  if (!q.get('ref')) q.set('ref', 'portal');
  return g.href + '?' + q.toString();
}

function render(){
  const t = I18N[lang];
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'he' ? 'rtl' : 'ltr';
  $('langBtn').textContent = lang === 'he' ? 'EN' : 'עב';
  $('langBtn').setAttribute('aria-pressed', lang === 'he');
  $('tSub').textContent = t.sub;
  $('tPromise').textContent = t.promise;
  $('tSafety').innerHTML = t.safety;
  $('shareBtn').textContent = t.share;

  const cards = GAMES.map((g, i) => {
    const cover = g.cover
      ? '<img class="cover" loading="' + (i ? 'lazy' : 'eager') + '" src="' + g.cover +
        '" alt="' + g.title + ' · ' + g.he + '">'
      : '<div class="cover-css" aria-hidden="true">' + (g.coverEmoji || '🎮') + '</div>';
    return '<article class="card">' + cover +
      '<div class="cbody"><h2>' + g.title + '</h2><div class="he">' + g.he + '</div>' +
      '<p class="hook">' + t.games[i].hook + '</p>' +
      '<a class="play" data-ev="' + g.event + '" href="' + gameHref(g) + '">' + t.play + '</a>' +
      '</div></article>';
  }).join('') +
  '<article class="card ghost"><div class="cbody"><p class="hook">' + t.soon + '</p>' +
  '<a class="notify" id="notifyBtn" href="https://wa.me/?text=' +
  encodeURIComponent(t.shareTxt + ' https://miklatgames.fun/?ref=notify') + '">' + t.notify + '</a></div></article>';
  $('cards').innerHTML = cards;

  for (const a of document.querySelectorAll('.play'))
    a.addEventListener('click', () => track(a.dataset.ev));
  const nb = $('notifyBtn');
  if (nb) nb.addEventListener('click', () => track('notify-click'));

  // inbound challenge strip
  const b = parseInt(INBOUND.get('b'), 10), c = INBOUND.get('c');
  if (b > 0){
    $('challenge').style.display = 'block';
    $('challenge').textContent = t.challenge.replace('{b}', b).replace('{c}', c || '');
    track('challenged');
  }
}

$('langBtn').addEventListener('click', () => {
  lang = lang === 'he' ? 'en' : 'he';
  localStorage.setItem('miklat.lang', lang);
  track('lang-toggle');
  render();
});

$('shareBtn').addEventListener('click', () => {
  const t = I18N[lang];
  const url = 'https://miklatgames.fun/?ref=share';
  if (navigator.share){
    navigator.share({ title: 'Miklat Games', text: t.shareTxt, url })
      .then(() => track('share')).catch(() => {});
  } else {
    track('share');
    window.open('https://wa.me/?text=' + encodeURIComponent(t.shareTxt + ' ' + url), '_blank');
  }
});

window.addEventListener('appinstalled', () => track('pwa-install'));

render();
track();

if ('serviceWorker' in navigator)
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
</script>
</body>
</html>
