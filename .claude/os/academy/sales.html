<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0d1120"><title>SALES — Zero Motion to First Booking</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💸</text></svg>">
<style>
:root{--bg:#0d1120;--card:#161d33;--ink:#f2f4ff;--dim:#9aa3c7;--gold:#ffd166;--red:#ff5d73;--green:#7ee8c7;--cyan:#3ee6ff;--purple:#b99cff}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font:16px/1.55 system-ui,-apple-system,'Segoe UI',sans-serif;padding-bottom:90px}
.wrap{max-width:680px;margin:0 auto;padding:18px 16px}
header{position:sticky;top:0;z-index:9;background:rgba(13,17,32,.94);backdrop-filter:blur(8px);border-bottom:1px solid #232c4d}
.hbar{max-width:680px;margin:0 auto;padding:10px 16px;display:flex;align-items:center;gap:12px}
.hbar a{color:var(--dim);text-decoration:none;font-size:13px;white-space:nowrap}
.xpwrap{flex:1}.xpbar{height:10px;background:#232c4d;border-radius:6px;overflow:hidden}
.xpfill{height:100%;background:linear-gradient(90deg,var(--gold),var(--green));width:0%;transition:width .6s}
.rank{font-size:12px;color:var(--gold);font-weight:700;margin-top:2px}
h1{font-size:clamp(26px,7vw,40px);line-height:1.1;color:var(--gold);text-shadow:0 0 24px rgba(255,209,102,.35)}
.sub{color:var(--dim);margin:8px 0 4px}
.lvl{background:var(--card);border:1px solid #232c4d;border-radius:16px;margin:14px 0;overflow:hidden}
.lvl-head{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none}
.lvl-head .num{font-size:22px}.lvl-head .t{font-weight:800;flex:1}.lvl-head .mins{font-size:12px;color:var(--dim)}.lvl-head .state{font-size:18px}
.lvl-body{display:none;padding:0 16px 16px;border-top:1px solid #232c4d}
.lvl.open .lvl-body{display:block}.lvl.locked{opacity:.45}.lvl.locked .lvl-head{cursor:not-allowed}
.card{background:#0f1528;border:1px solid #232c4d;border-radius:12px;padding:13px 14px;margin:12px 0}
.card h3{font-size:14px;color:var(--cyan);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.card p{margin:6px 0;font-size:15px}.big{color:var(--gold);font-weight:800}
.num-row{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}
.stat{background:#0f1528;border:1px solid #2a3458;border-radius:10px;padding:8px 12px;text-align:center;flex:1;min-width:120px}
.stat b{display:block;font-size:18px;color:var(--gold)}.stat span{font-size:11.5px;color:var(--dim)}
.quiz{border-left:3px solid var(--purple)}.quiz h3{color:var(--purple)}
.opt{display:block;width:100%;text-align:left;background:#161d33;border:1px solid #2a3458;color:var(--ink);border-radius:10px;padding:10px 12px;margin:7px 0;font-size:14.5px;cursor:pointer}
.opt:hover{border-color:var(--gold)}
.opt.right{border-color:var(--green);background:rgba(126,232,199,.12)}
.opt.wrong{border-color:var(--red);background:rgba(255,93,115,.12)}
.explain{display:none;font-size:13.5px;color:var(--green);margin-top:8px}
.mission{border-left:3px solid var(--gold)}.mission h3{color:var(--gold)}
.mission label{display:flex;gap:10px;align-items:flex-start;cursor:pointer;margin-top:8px}
.mission input{width:20px;height:20px;margin-top:2px;accent-color:var(--gold)}
.mxp{font-size:12px;color:var(--gold);font-weight:700}
.donebtn{display:block;width:100%;background:linear-gradient(90deg,var(--gold),#ffb84d);color:#1a1405;font-weight:900;border:0;border-radius:12px;padding:13px;font-size:16px;margin-top:14px;cursor:pointer}
.donebtn:disabled{opacity:.4;cursor:not-allowed}
table{width:100%;border-collapse:collapse;font-size:13px;margin:8px 0}
th,td{border-bottom:1px solid #232c4d;padding:6px 6px;text-align:left;vertical-align:top}
th{color:var(--dim);font-size:11.5px;text-transform:uppercase}td b{color:var(--gold)}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(80px);background:var(--gold);color:#1a1405;font-weight:800;padding:10px 18px;border-radius:99px;transition:transform .3s;z-index:99}
.toast.show{transform:translateX(-50%) translateY(0)}
.fin{display:none;text-align:center;padding:30px 16px}.fin h2{color:var(--gold);font-size:30px}
ul{padding-left:20px}li{margin:4px 0;font-size:14.5px}
.src{font-size:11px;color:#5e6890;margin-top:6px}
</style></head><body>
<header><div class="hbar">
  <a href="index.html">🎓 CAMPUS</a>
  <div class="xpwrap"><div class="xpbar"><div class="xpfill" id="xpfill"></div></div><div class="rank" id="rank"></div></div>
  <span id="xptxt" style="font-size:13px;color:var(--gold);font-weight:800">0 XP</span>
</div></header>
<div class="wrap">
  <h1>💸 SALES — Zero Motion to First Booking</h1>
  <p class="sub">Your #1 venture got 1 of 59 commits this month. ~50 min to a live funnel and the path to booking #1.</p>
  <div id="levels"></div>
  <div class="fin" id="fin"><h2>💸 CLOSER</h2><p>The funnel is live. Now it's reps: money block daily, bookings weekly.</p></div>
</div>
<div class="toast" id="toast"></div>
<script>
'use strict';
const LEVELS=[{"icon": "🪞", "title": "LEVEL 0 · THE MIRROR", "mins": "5 min", "html": "<div class='card'><h3>The audit, no anesthesia</h3><p>ventures.md calls sellsellingai \"💰 the money maker. Top priority.\" The last 30 days: <span class='big'>SSA got 2% of effort. Its goal line still literally reads \"(define: more demos? bookings?)\".</span> BYB has a beautiful live site with <b>no booking link</b> — a store with no till.</p></div><div class='card'><h3>Why — and why it's fixable in a week</h3><p>Games are shippable and visible; sales feels abstract and exposed. But sales is NOT abstract — it's four concrete parts: <span class='big'>someone specific (ICP) → one offer → one click (booking) → one follow-up (email)</span>. Each part is an hour of work you've already half-drafted. This course just makes you finish the wiring.</p></div>", "quiz": {"q": "What is a beautiful live site with no booking link?", "opts": ["Brand-building", "A store with no till", "A good start", "Fine"], "a": 1, "ex": "Traffic with no capture is rented attention, returned at the end of the visit. The till comes BEFORE more marketing — always."}, "mission": {"id": "m0", "xp": 50, "txt": "Say the quiet number out loud: write in the nucleus what SSA earned in the last 30 days. (It's ₪0. That's the baseline we beat.)"}}, {"icon": "🎯", "title": "LEVEL 1 · ICP — who is it FOR", "mins": "10 min", "html": "<div class='card'><h3>The undefined ventures default to nothing</h3><p>4 of 6 ventures have \"(define:)\" markers. Without a named buyer, the standup can't make a sales task concrete, so it schedules a game task instead. <b>The empty ICP line is the root of the priority inversion.</b></p></div><div class='card'><h3>The one-line ICP formula</h3><p><b>[Specific person] who [painful situation] and will pay [price] for [outcome this week].</b><br>SSA candidate: \"Freelancers/agency owners selling AI services who freeze on sales calls, ₪X for the system that books their next 3 clients.\" BYB candidate: \"SMB owner who knows they need AI but not where to start, paying for a built bot + audit.\" Don't perfect them — write them. Wrong ICPs get corrected by calls; empty ICPs get corrected by nothing.</p></div>", "quiz": {"q": "What does an undefined ICP cause at standup time?", "opts": ["Nothing", "Sales tasks stay abstract, so shippable game tasks win the slot every time", "More creativity", "Better focus"], "a": 1, "ex": "That's the audit's mechanism for the 52%-vs-2% inversion: 'what should I work on' needs a WHO before it can produce a concrete sales action."}, "mission": {"id": "m1", "xp": 75, "txt": "Dictate one-line ICPs for SSA and BYB to Claude right now — they go into ventures.md and every '(define:)' dies. Wrong is fine; empty is not."}}, {"icon": "🔗", "title": "LEVEL 2 · THE TILL — one booking link", "mins": "10 min", "html": "<div class='card'><h3>The single highest-leverage hour in your portfolio</h3><p>One Calendly (or Cal.com — free) link. One button on the BYB site: <b>\"Book a free 15-min AI audit.\"</b> Claude wires the button the moment you paste the link. From that second, every visitor is a potential booking, and your funnel has a <b>number</b> instead of a feeling.</p></div><div class='card'><h3>One metric to rule the venture</h3><p>The audit's prescription: <span class='big'>1 booking in 30 days.</span> Not revenue, not followers — one stranger picking a time slot. That single event validates the ICP, the offer, AND the channel at once. Everything else in SSA/BYB exists to make that number go up.</p></div>", "quiz": {"q": "Why is 'bookings' the right first metric (not revenue or followers)?", "opts": ["It's easiest", "One booking validates ICP + offer + channel simultaneously", "Revenue is vanity", "Calendly says so"], "a": 1, "ex": "A booking is a stranger trading their time for your offer — the smallest complete proof the funnel works end to end. Revenue follows reps of that."}, "mission": {"id": "m2", "xp": 100, "txt": "Create the free Calendly/Cal.com, paste the link to Claude → booking button live on BYB today. The till is open."}}, {"icon": "📧", "title": "LEVEL 3 · THE FOLLOW-UP — ship the drafts", "mins": "10 min", "html": "<div class='card'><h3>You already wrote the hard part</h3><p>challenge-emails.md exists. ssa-week-1.md has a 5-day launch flywheel fully scripted (Mon confession → Fri offer). <b>Drafted ≠ done — sent = done</b>, your own rule. The remaining work isn't writing; it's picking a date and pressing send.</p></div><div class='card'><h3>Sequence mechanics, minimum viable</h3><ul><li>Pick the audience seed: your existing contacts/groups — warm beats cold for launch #1.</li><li>Day-stamp the 5-day flywheel onto a real calendar week.</li><li>Every email ends with the booking link from Level 2. The funnel closes the loop: content → email → booking.</li></ul></div>", "quiz": {"q": "What's actually left on the email sequence?", "opts": ["Rewrite everything", "Pick a date and send — the drafts exist", "Hire a copywriter", "Build a CRM first"], "a": 1, "ex": "The audit found the flywheel fully scripted and 10 days idle. The blocker is a calendar decision, not a writing task. CRM comes after there's a pipeline to manage."}, "mission": {"id": "m3", "xp": 100, "txt": "Pick the launch week NOW and tell Claude — the 5-day flywheel gets day-stamped onto the content board with the booking link wired into every email."}}, {"icon": "🛡️", "title": "LEVEL 4 · PROTECT THE MONEY BLOCK + BOSS", "mins": "12 min", "html": "<div class='card'><h3>The structural fix for the inversion</h3><p><b>The Money Block: 30 minutes, every morning, BEFORE anything Miklat.</b> Standup names exactly one sales action (today's email, today's post, today's follow-up). Miklat is the reward for finishing it, not the alternative to starting it. This is the 2-box rule with teeth: money-maker eats first.</p></div><div class='card'><h3>Delegation is the escape hatch</h3><p>You built ssa-ceo, ssa-mktg, ssa-research and never staffed them. Research, drafts, and atomizing go to agents (the Automation course's loop); only the human moments — recording, sending, calls — stay yours. Your 30 minutes is the human 30 minutes.</p></div>", "quiz": null, "boss": [{"q": "The first sales metric for SSA/BYB:", "opts": ["Revenue", "1 booking in 30 days", "Followers", "Site visits"], "a": 1}, {"q": "An empty ICP line causes…", "opts": ["Nothing", "Abstract sales tasks that always lose to shippable game tasks", "Flexibility", "Faster pivots"], "a": 1}, {"q": "The Money Block rule:", "opts": ["Sales when there's time", "30 min of sales BEFORE anything Miklat, daily", "Sales on Sundays", "Delegate all sales"], "a": 1}, {"q": "What's left on the email flywheel?", "opts": ["Writing it", "A date and a send button", "A CRM", "A designer"], "a": 1}], "mission": {"id": "m4", "xp": 100, "txt": "Declare the Money Block to Claude — it becomes a standing first item in every standup. Tomorrow morning: 30 sales minutes before a single line of game code."}}];
const RANKS=[[0, "👻 Zero Motion"], [120, "🎯 ICP Locked"], [280, "🔗 Funnel Live"], [450, "💸 Closer"]];
const STORE='academy-sales';
const MAXXP=755;
let S=JSON.parse(localStorage.getItem(STORE)||'{"xp":0,"quiz":{},"missions":{},"boss":{},"done":{}}');
const save=()=>localStorage.setItem(STORE,JSON.stringify(S));
const $=id=>document.getElementById(id);
function toast(t){const e=$('toast');e.textContent=t;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),1900);}
function gain(n){S.xp+=n;save();renderHud();toast('+'+n+' XP');}
function renderHud(){
  $('xpfill').style.width=Math.min(100,S.xp/MAXXP*100)+'%';
  $('xptxt').textContent=S.xp+' XP';
  let r=RANKS[0][1];for(const[t,n]of RANKS)if(S.xp>=t)r=n;
  $('rank').textContent=r;
}
function levelDone(i){return !!S.done['l'+i];}
function unlocked(i){return i===0||levelDone(i-1);}
function bossLevel(){return LEVELS.findIndex(l=>l.boss);}
function build(){
  const root=$('levels');root.innerHTML='';
  LEVELS.forEach((L,i)=>{
    const el=document.createElement('div');
    el.className='lvl'+(unlocked(i)?'':' locked');
    let inner=`<div class="lvl-head" data-i="${i}"><span class="num">${L.icon}</span><span class="t">${L.title}</span><span class="mins">${L.mins}</span><span class="state">${levelDone(i)?'✅':unlocked(i)?'▶':'🔒'}</span></div><div class="lvl-body">${L.html}`;
    if(L.quiz){
      const done=S.quiz[i]!==undefined;
      inner+=`<div class="card quiz"><h3>⚔️ Take the shot (+25 XP)</h3><p>${L.quiz.q}</p>`+
        L.quiz.opts.map((o,j)=>`<button class="opt ${done?(j===L.quiz.a?'right':(S.quiz[i]===j?'wrong':'')):''}" data-l="${i}" data-j="${j}" ${done?'disabled':''}>${o}</button>`).join('')+
        `<div class="explain" style="display:${done?'block':'none'}">${L.quiz.ex}</div></div>`;
    }
    if(L.boss){
      inner+=`<div class="card quiz"><h3>👹 BOSS FIGHT — +20 XP each</h3>`;
      L.boss.forEach((B,k)=>{
        const done=S.boss[k]!==undefined;
        inner+=`<p style="margin-top:12px"><b>${k+1}.</b> ${B.q}</p>`+
          B.opts.map((o,j)=>`<button class="opt ${done?(j===B.a?'right':(S.boss[k]===j?'wrong':'')):''}" data-b="${k}" data-j="${j}" ${done?'disabled':''}>${o}</button>`).join('');
      });
      inner+=`</div>`;
    }
    if(L.mission){
      const m=S.missions[L.mission.id];
      inner+=`<div class="card mission"><h3>🎯 Mission <span class="mxp">+${L.mission.xp} XP</span></h3>
      <label><input type="checkbox" data-m="${L.mission.id}" data-xp="${L.mission.xp}" data-l="${i}" ${m?'checked disabled':''}><span>${L.mission.txt}</span></label></div>`;
    }
    inner+=`<button class="donebtn" data-fin="${i}" ${levelDone(i)?'disabled':''}>${levelDone(i)?'LEVEL CLEAR ✅':'COMPLETE LEVEL ▶'}</button></div>`;
    el.innerHTML=inner;root.appendChild(el);
  });
  $('fin').style.display=levelDone(LEVELS.length-1)?'block':'none';
}
document.addEventListener('click',e=>{
  const h=e.target.closest('.lvl-head');
  if(h){const i=+h.dataset.i;if(!unlocked(i)){toast('Clear the previous level first 🔒');return;}
    h.parentElement.classList.toggle('open');return;}
  const o=e.target.closest('.opt');
  if(o&&!o.disabled){
    if(o.dataset.l!==undefined){const i=+o.dataset.l,j=+o.dataset.j;S.quiz[i]=j;save();
      if(j===LEVELS[i].quiz.a)gain(25);else toast('Not quite — read the green answer');
      build();openLvl(i);return;}
    if(o.dataset.b!==undefined){const k=+o.dataset.b,j=+o.dataset.j;S.boss[k]=j;save();
      if(j===LEVELS[bossLevel()].boss[k].a)gain(20);else toast('Boss hit you back 💥');
      build();openLvl(bossLevel());return;}
  }
  const m=e.target.closest('input[data-m]');
  if(m&&m.checked){S.missions[m.dataset.m]=1;save();gain(+m.dataset.xp);build();openLvl(+m.dataset.l);return;}
  const f=e.target.closest('[data-fin]');
  if(f&&!f.disabled){const i=+f.dataset.fin;S.done['l'+i]=1;save();gain(30);
    build();if(i<LEVELS.length-1)openLvl(i+1);}
});
function openLvl(i){const els=document.querySelectorAll('.lvl');if(els[i])els[i].classList.add('open');}
build();renderHud();
openLvl(Object.keys(S.done).length?Math.min(LEVELS.length-1,Object.keys(S.done).length):0);
</script></body></html>
