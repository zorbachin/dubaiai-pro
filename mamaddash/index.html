<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0b0e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta property="og:title" content="MAMAD DASH — outrun the siren">
<meta property="og:description" content="The siren is live. Jump the savtas, duck the doves, stack shekels, reach the mamad. How many sirens can you survive?">
<meta property="og:url" content="https://dubaiai.pro/mamaddash/">
<title>MAMAD DASH 🚨</title>
<style>
  :root{ --navy:#0b0e1a; --gold:#ffd166; --teal:#7ee8c7; --red:#ff5d5d; }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;overscroll-behavior:none;touch-action:none;
    background:var(--navy);font-family:-apple-system,'Segoe UI',Roboto,sans-serif;color:#e8ecf6;
    user-select:none;-webkit-user-select:none;}
  #wrap{position:fixed;inset:0;}
  #wrap.shake{animation:shk .3s linear;}
  @keyframes shk{0%,100%{transform:none}20%{transform:translate(-7px,4px)}40%{transform:translate(6px,-5px)}
    60%{transform:translate(-5px,-3px)}80%{transform:translate(4px,5px)}}
  canvas{display:block;width:100%;height:100%;}
  #flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;transition:opacity .5s;}
  .panel{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:24px;z-index:10;background:radial-gradient(ellipse at 50% 35%,rgba(11,14,26,.55),rgba(11,14,26,.92));}
  .logo{font-size:clamp(38px,11vw,72px);font-weight:900;letter-spacing:.02em;line-height:1;
    background:linear-gradient(180deg,#ffe29a,#e9a23b);-webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 4px 18px rgba(233,162,59,.35));}
  .tag{margin-top:10px;font-size:clamp(13px,3.6vw,17px);color:#aab4c8;max-width:420px;line-height:1.45;}
  .big{font-size:clamp(20px,6vw,30px);font-weight:800;color:var(--gold);margin-top:26px;animation:pulse 1.1s ease-in-out infinite;}
  @keyframes pulse{50%{transform:scale(1.07);opacity:.85}}
  .controls{margin-top:16px;font-size:clamp(12px,3.4vw,14px);color:#aab4c8;
    display:flex;gap:18px;justify-content:center;}
  .controls b{color:var(--teal);}
  .btn{margin-top:14px;border:0;border-radius:14px;padding:15px 34px;font-size:17px;font-weight:800;cursor:pointer;
    background:linear-gradient(180deg,#ffd166,#e9a23b);color:#1a1405;box-shadow:0 6px 22px rgba(233,162,59,.35);}
  .btn:active{transform:scale(.96);}
  .btn.ghost{background:transparent;color:#cdd6e8;border:1px solid #46506b;box-shadow:none;font-weight:600;}
  .stat{font-size:clamp(15px,4.2vw,18px);margin-top:8px;color:#cdd6e8;}
  .stat b{color:var(--gold);}
  .best{margin-top:18px;font-size:14px;color:var(--teal);}
  #dead .skull{font-size:54px;}
  #mute{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 12px);right:12px;z-index:20;font-size:20px;
    background:rgba(13,17,32,.55);border:1px solid #2a3450;border-radius:10px;padding:6px 10px;color:#e8ecf6;}
  .hidden{display:none!important;}
</style>
</head>
<body>
<div id="wrap"><canvas id="cv"></canvas></div>
<div id="flash"></div>
<button id="mute">🔊</button>

<div class="panel" id="title">
  <div class="logo">MAMAD DASH</div>
  <div class="tag">🚨 The siren is live. Jump the savtas, duck the doves, stack shekels — and reach the mamad before the boom.</div>
  <div class="controls"><span><b>TAP</b> jump</span><span><b>SWIPE ↓</b> duck</span></div>
  <div class="big">TAP TO RUN ▶</div>
  <div class="best" id="titleBest"></div>
</div>

<div class="panel hidden" id="dead">
  <div class="skull">💥</div>
  <div class="logo" style="font-size:clamp(28px,8vw,46px);">CAUGHT OUTSIDE</div>
  <div class="stat" style="margin-top:18px;">🚨 Sirens survived: <b id="dSirens">0</b></div>
  <div class="stat">💸 Shekels stacked: <b id="dCoins">0₪</b></div>
  <div class="stat">🏃 Distance: <b id="dDist">0m</b></div>
  <div class="best" id="dBest"></div>
  <button class="btn" id="againBtn">RUN AGAIN ▶</button>
  <button class="btn ghost" id="shareBtn">📤 SHARE SCORE</button>
</div>

<script>
'use strict';
/* ============ MAMAD DASH — standalone siren runner ============
   One file, mobile-first. Tap = jump, swipe down = duck.
   Endless waves: each siren is a dash to the mamad; survive, breathe,
   the next one is faster and denser. Caught outside = run over. */

const $=id=>document.getElementById(id);
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const rand=(a,b)=>a+Math.random()*(b-a);
const irand=(a,b)=>Math.floor(rand(a,b+1));

/* ---------------- sound (WebAudio, built on first gesture) ---------------- */
const Sound={
  ctx:null, on:localStorage.getItem('md_mute')!=='1', sirenNodes:null,
  init(){ if(!this.ctx){ try{ this.ctx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
    if(this.ctx&&this.ctx.state==='suspended') this.ctx.resume(); },
  beep(f,d,type='square',g=.05,slide=0){
    if(!this.on||!this.ctx) return;
    const o=this.ctx.createOscillator(),v=this.ctx.createGain(),t=this.ctx.currentTime;
    o.type=type;o.frequency.setValueAtTime(f,t);
    if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(40,f+slide),t+d);
    v.gain.setValueAtTime(g,t);v.gain.exponentialRampToValueAtTime(.0001,t+d);
    o.connect(v).connect(this.ctx.destination);o.start(t);o.stop(t+d);
  },
  jump(){this.beep(620,.1,'square',.04,300);},
  duck(){this.beep(300,.09,'square',.035,-120);},
  coin(){this.beep(1318,.06,'square',.04);setTimeout(()=>this.beep(1760,.09,'square',.04),55);},
  hit(){this.beep(140,.22,'sawtooth',.08,-60);},
  door(){this.beep(523,.1,'square',.05);setTimeout(()=>this.beep(784,.16,'square',.05),90);},
  boom(){if(!this.on||!this.ctx)return;
    const b=this.ctx.createBuffer(1,this.ctx.sampleRate*.5,this.ctx.sampleRate),d=b.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2.2);
    const s=this.ctx.createBufferSource(),v=this.ctx.createGain();s.buffer=b;
    v.gain.value=.22;s.connect(v).connect(this.ctx.destination);s.start();},
  sirenStart(){
    if(!this.on||!this.ctx||this.sirenNodes) return;
    const o=this.ctx.createOscillator(),v=this.ctx.createGain(),l=this.ctx.createOscillator(),lg=this.ctx.createGain();
    o.type='triangle';o.frequency.value=660;l.frequency.value=.55;lg.gain.value=160;
    l.connect(lg).connect(o.frequency);v.gain.value=.035;
    o.connect(v).connect(this.ctx.destination);o.start();l.start();
    this.sirenNodes={o,l,v};
  },
  sirenStop(){ if(this.sirenNodes){ try{this.sirenNodes.o.stop();this.sirenNodes.l.stop();}catch(e){} this.sirenNodes=null; } },
};
$('mute').textContent=Sound.on?'🔊':'🔇';
$('mute').addEventListener('click',e=>{ e.stopPropagation();
  Sound.on=!Sound.on; localStorage.setItem('md_mute',Sound.on?'0':'1');
  $('mute').textContent=Sound.on?'🔊':'🔇'; if(!Sound.on) Sound.sirenStop(); });

/* ---------------- canvas ---------------- */
const cv=$('cv'),cx=cv.getContext('2d');
let W=0,H=0,DPR=1,groundY=0;
function resize(){
  DPR=Math.min(2,window.devicePixelRatio||1);
  W=window.innerWidth;H=window.innerHeight;
  cv.width=W*DPR;cv.height=H*DPR;cx.setTransform(DPR,0,0,DPR,0,0);
  groundY=Math.round(H*.74);
}
window.addEventListener('resize',resize);resize();

function drawEmoji(e,x,y,s){ cx.font=s+'px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif';
  cx.textAlign='center';cx.textBaseline='middle';cx.fillText(e,x,y); }

/* ---------------- obstacle sets ----------------
   ground = JUMP (gold ring) · air = DUCK (teal ring). No emoji in both sets. */
const GROUND=['👵','🛒','🐕','📦','⛱️','🛹','🪴'];
const AIR=['🕊️','🏐','🪁','🥏','🍾'];

/* ---------------- game state ---------------- */
const PLAYER_X=()=>Math.round(W*.24);
const G={
  state:'title',           // title | run | inside | dead
  wave:0, dist:0, coins:0, t:0,
  best:JSON.parse(localStorage.getItem('md_best')||'{"sirens":0,"coins":0}'),
  player:{y:0,vy:0,duckT:0},
  speed:0, prog:0, goal:0, deadline:0, total:0,
  obs:[], picks:[], nextOb:0, nextCoin:0,
  hits:0, stumble:0, invuln:0, shieldFlash:0,
  insideT:0, tutorial:!localStorage.getItem('md_best'),
  rockets:[],
};
function waveCfg(n){            // n = 1-based wave number
  return {
    goal: 2800+(n-1)*450,
    v0:   240+(n-1)*14,                       // calm start…
    v1:   Math.min(640,470+(n-1)*26),         // …frantic finish
    obGap:[Math.max(200,330-(n-1)*9), Math.max(290,520-(n-1)*14)],
    airP: Math.min(.5,.2+(n-1)*.035),
  };
}
function startWave(){
  G.wave++; const c=waveCfg(G.wave); G.cfg=c;
  G.prog=0; G.goal=c.goal; G.obs=[]; G.picks=[]; G.rockets=[];
  G.nextOb=G.tutorial?420:520; G.nextCoin=750;
  G.hits=0; G.stumble=0; G.invuln=0;
  G.player.y=0; G.player.vy=0; G.player.duckT=0;
  // budget: clean run uses ~76% of the clock
  const avg=(c.v0+c.v1)/2; G.total=(c.goal/avg)/.76; G.deadline=G.t+G.total;
  G.state='run'; Sound.sirenStart();
  if(navigator.vibrate) navigator.vibrate([90,60,90]);
}
function enterMamad(){
  Sound.sirenStop(); Sound.door();
  G.state='inside'; G.insideT=1.7; G.shieldFlash=1;
  G.rockets.push({x:rand(W*.15,W*.5),y:H*.55,t:0});   // iron dome intercept show
  setTimeout(()=>{ Sound.boom(); flash(.55); shake(); if(navigator.vibrate) navigator.vibrate(160); },650);
  if(G.tutorial){ G.tutorial=false; }
}
function die(){
  Sound.sirenStop(); Sound.boom(); flash(.85); shake();
  if(navigator.vibrate) navigator.vibrate([60,40,220]);
  G.state='dead';
  const sirens=G.wave-1, nb={sirens:Math.max(G.best.sirens,sirens), coins:Math.max(G.best.coins,G.coins)};
  const isBest=sirens>G.best.sirens;
  G.best=nb; localStorage.setItem('md_best',JSON.stringify(nb));
  $('dSirens').textContent=sirens;
  $('dCoins').textContent=G.coins+'₪';
  $('dDist').textContent=Math.round(G.dist/10)+'m';
  $('dBest').textContent=isBest?'🏆 NEW BEST!':`Best: ${nb.sirens} sirens · ${nb.coins}₪`;
  setTimeout(()=>$('dead').classList.remove('hidden'),550);
}
function resetRun(){ G.wave=0;G.dist=0;G.coins=0;startWave(); }
function flash(o){ const f=$('flash');f.style.transition='none';f.style.opacity=o;
  requestAnimationFrame(()=>{f.style.transition='opacity .5s';f.style.opacity=0;}); }
function shake(){ const w=$('wrap');w.classList.remove('shake');void w.offsetWidth;w.classList.add('shake'); }

/* ---------------- input: tap = jump · swipe down = duck ---------------- */
function jump(){ const p=G.player;
  if(G.state==='run'&&p.y<=0&&G.stumble<=0){ p.vy=720; p.duckT=0; Sound.jump(); } }
function duck(){ const p=G.player;
  if(G.state!=='run') return;
  if(p.y>0){ p.vy=-980; p.duckT=.6; Sound.duck(); }   // mid-air: slam down into a duck
  else { p.duckT=.55; Sound.duck(); } }
function primary(){          // any tap: start / jump / restart
  if(G.state==='title'){ Sound.init(); $('title').classList.add('hidden'); resetRun(); }
  else if(G.state==='run') jump();
}
let touchY0=null,touchT0=0,swiped=false;
window.addEventListener('touchstart',e=>{
  if(e.target.closest('button')) return;
  e.preventDefault();
  touchY0=e.touches[0].clientY; touchT0=performance.now(); swiped=false;
},{passive:false});
window.addEventListener('touchmove',e=>{
  if(touchY0===null||swiped) return;
  const dy=e.touches[0].clientY-touchY0;
  if(dy>26){ swiped=true; if(G.state==='run') duck(); else primary(); }
  else if(dy<-26){ swiped=true; primary(); }
},{passive:false});
window.addEventListener('touchend',e=>{
  if(e.target.closest('button')) return;
  if(!swiped && performance.now()-touchT0<350) primary();
  touchY0=null;
},{passive:false});
window.addEventListener('mousedown',e=>{ if(!e.target.closest('button')) primary(); });
window.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(k===' '||k==='arrowup'||k==='w'){ e.preventDefault(); primary(); }
  if(k==='arrowdown'||k==='s'){ e.preventDefault(); if(G.state==='run') duck(); }
});
$('againBtn').addEventListener('click',()=>{ $('dead').classList.add('hidden'); resetRun(); });
$('shareBtn').addEventListener('click',async()=>{
  const s=G.wave-1;
  const txt=`🚨 I survived ${s} siren${s===1?'':'s'} and stacked ${G.coins}₪ in MAMAD DASH — beat me: https://dubaiai.pro/mamaddash/`;
  try{ if(navigator.share) await navigator.share({text:txt});
    else{ await navigator.clipboard.writeText(txt); $('shareBtn').textContent='✅ COPIED';
      setTimeout(()=>$('shareBtn').textContent='📤 SHARE SCORE',1600); } }catch(e){}
});

/* ---------------- update ---------------- */
function update(dt){
  G.t+=dt;
  if(G.state==='inside'){
    G.insideT-=dt; for(const r of G.rockets) r.t+=dt;
    if(G.insideT<=0) startWave();
    return;
  }
  if(G.state!=='run') return;
  const c=G.cfg, p=G.player;
  const left=G.deadline-G.t;
  const u=clamp(1-left/G.total,0,1);            // 0 calm → 1 frantic
  // player physics
  p.y+=p.vy*dt;
  if(p.y>0) p.vy-=2050*dt; else {p.y=0;p.vy=Math.max(0,p.vy);}
  if(p.duckT>0) p.duckT-=dt;
  if(G.stumble>0) G.stumble-=dt;
  if(G.invuln>0) G.invuln-=dt;
  // speed ramps with the countdown
  G.speed=c.v0+(c.v1-c.v0)*u;
  const v=G.stumble>0?G.speed*.45:G.speed;
  G.prog+=v*dt; G.dist+=v*dt;
  // spawn obstacles by distance (runway stays clear before the door)
  if(G.goal-G.prog>700&&G.prog>=G.nextOb){
    const air=Math.random()<c.airP+(u*.12);
    const set=air?AIR:GROUND;
    G.obs.push({x:W+90,air,emoji:set[irand(0,set.length-1)],
      label:G.tutorial&&G.obs.length<2?(air?'SWIPE ↓':'TAP!'):null});
    G.nextOb=G.prog+Math.max(c.obGap[0],rand(c.obGap[0],c.obGap[1])*(1-.4*u));
  }
  // coins: small arcs between obstacles
  if(G.goal-G.prog>500&&G.prog>=G.nextCoin){
    const lift=Math.random()<.5?0:64;
    for(let i=0;i<3;i++) G.picks.push({x:W+90+i*46,y:groundY-34-lift-(lift?Math.sin(i/2*Math.PI)*16:0)});
    G.nextCoin=G.prog+rand(520,900);
  }
  for(const o of G.obs) o.x-=v*dt;
  for(const k of G.picks) k.x-=v*dt;
  G.obs=G.obs.filter(o=>o.x>-90); G.picks=G.picks.filter(k=>k.x>-40);
  // collisions
  const px=PLAYER_X(), ducking=p.duckT>0&&p.y<=0;
  if(G.invuln<=0) for(const o of G.obs){
    if(Math.abs(o.x-px)>30) continue;
    const hit=o.air?(!ducking&&p.y<52):(p.y<44);
    if(hit){
      G.hits++; G.stumble=.5; G.invuln=.9; G.prog=Math.max(0,G.prog-150);
      o.x=-999; Sound.hit(); shake(); if(navigator.vibrate) navigator.vibrate(110);
      break;
    }
  }
  for(const k of G.picks){
    if(Math.abs(k.x-px)<30&&Math.abs((groundY-p.y-30)-k.y)<44){ k.x=-999; G.coins+=5; Sound.coin(); }
  }
  if(G.prog>=G.goal){ G.coins+=20+G.wave*5; enterMamad(); return; }
  if(left<=0){ die(); return; }
}

/* ---------------- draw ---------------- */
function draw(){
  const p=G.player, px=PLAYER_X();
  const left=G.state==='run'?Math.max(0,G.deadline-G.t):0;
  const u=G.state==='run'?clamp(1-left/G.total,0,1):0;
  // dusk sky
  const sky=cx.createLinearGradient(0,0,0,groundY);
  sky.addColorStop(0,'#141a30');sky.addColorStop(.55,'#3a2547');sky.addColorStop(1,'#7a3b50');
  cx.fillStyle=sky;cx.fillRect(0,0,W,groundY);
  // alert vignette pulses as the boom nears
  if(G.state==='run'&&u>.62){
    cx.fillStyle=`rgba(255,60,60,${(.1+.16*Math.abs(Math.sin(G.t*6)))*(u-.55)})`;
    cx.fillRect(0,0,W,H);
  }
  // stars, moon + skyline parallax (two layers)
  cx.fillStyle='rgba(255,255,255,.5)';
  for(let i=0;i<26;i++){
    const sx=(i*173.7)%1, sy=(i*97.3)%1;
    cx.globalAlpha=.25+.45*Math.abs(Math.sin(G.t*.8+i));
    cx.fillRect(sx*W,sy*groundY*.55,2,2);
  }
  cx.globalAlpha=1;
  drawEmoji('🌙',W*.82,H*.12,34);
  cx.fillStyle='#1c2238';
  skyline(G.dist*.12,Math.max(90,groundY*.3),.55);
  cx.fillStyle='#272f4d';
  skyline(G.dist*.28+400,Math.max(58,groundY*.2),.78);
  // street
  cx.fillStyle='#3b3344';cx.fillRect(0,groundY,W,H-groundY);
  cx.fillStyle='#2e2836';cx.fillRect(0,groundY,W,6);
  cx.fillStyle='rgba(255,255,255,.35)';
  for(let x=-((G.dist*1)%80);x<W;x+=80) cx.fillRect(x,groundY+Math.round((H-groundY)*.42),36,4);
  if(G.state==='title'){ titleScene(); return; }
  // mamad door approaching
  const doorX=px+(G.goal-G.prog);
  if(doorX<W+120) door(doorX);
  // coins
  for(const k of G.picks) drawEmoji('🪙',k.x,k.y,26);
  // obstacles: shadow + colored telegraph ring (gold=jump, teal=duck)
  for(const o of G.obs){
    const oy=o.air?groundY-86:groundY-26;
    cx.fillStyle='rgba(0,0,0,.3)';
    cx.beginPath();cx.ellipse(o.x,groundY+8,o.air?14:20,5,0,0,7);cx.fill();
    cx.strokeStyle=o.air?'rgba(126,232,199,.8)':'rgba(255,209,102,.8)';
    cx.lineWidth=2.5;cx.beginPath();cx.arc(o.x,oy,30,0,7);cx.stroke();
    drawEmoji(o.emoji,o.x,oy,o.air?40:46);
    if(o.air){ drawEmoji('💨',o.x+34,oy-6,16); }
    if(o.label){ cx.fillStyle='#fff';cx.font='bold 15px sans-serif';cx.textAlign='center';
      cx.fillText(o.label,o.x,oy-52); }
  }
  // player (+shadow shrinks with height)
  const sw=22*(1-clamp(p.y/260,0,.5));
  cx.fillStyle='rgba(0,0,0,.35)';
  cx.beginPath();cx.ellipse(px,groundY+8,sw,6,0,0,7);cx.fill();
  if(!(G.invuln>0&&Math.floor(G.t*14)%2===0)){
    cx.save();cx.translate(px,groundY-p.y-30);
    cx.scale(-1,1);                 // 🏃 faces left natively — mirror to run right
    if(G.stumble>0) cx.rotate(-.45);
    if(p.duckT>0&&p.y<=0){ cx.scale(1.18,.6); }
    else if(p.y<=0&&G.state==='run') cx.translate(0,Math.sin(G.t*17)*2.5);
    drawEmoji('🏃',0,0,46);
    // phone held out in front, filming the whole thing (mirrored space: front = -x)
    cx.save();cx.translate(-27,-6);cx.rotate(.3);drawEmoji('📱',0,0,17);
    cx.fillStyle=Math.floor(G.t*3)%2?'#ff3b3b':'#ff8a8a';
    cx.beginPath();cx.arc(-1,-11,2.6,0,7);cx.fill();cx.restore();
    cx.restore();
  }
  // dust at heels
  if(G.state==='run'&&p.y<=0) drawEmoji('💨',px-30,groundY-12,15+u*7);
  hud(left,u);
  // inside-the-mamad beat
  if(G.state==='inside') insideScene();
}
function skyline(off,hMax,shade){
  const sp=170,first=Math.floor(off/sp)-1;
  for(let i=first;i*sp-off<W+sp;i++){
    const seed=Math.abs(Math.sin(i*127.3));
    const bh=40+seed*hMax, bw=90+((i%3)*30);
    cx.fillRect(i*sp-off,groundY-bh,bw,bh);
    // lit windows
    cx.save();cx.fillStyle=`rgba(255,209,102,${.25*shade})`;
    for(let wY=groundY-bh+10;wY<groundY-12;wY+=18)
      for(let wX=i*sp-off+8;wX<i*sp-off+bw-10;wX+=22)
        if(Math.abs(Math.sin(wX*wY))>.72) cx.fillRect(wX,wY,7,9);
    cx.restore();
  }
}
function door(x){
  cx.fillStyle='#0f8a72';cx.fillRect(x-8,groundY-118,86,118);
  cx.fillStyle='#0b6b59';cx.fillRect(x,groundY-106,70,106);
  drawEmoji('🛡️',x+35,groundY-66,40);
  cx.fillStyle='#dffaf1';cx.font='bold 13px sans-serif';cx.textAlign='center';
  cx.fillText('MAMAD',x+35,groundY-14);
  cx.strokeStyle='rgba(126,232,199,.7)';cx.lineWidth=3;
  cx.strokeRect(x-8,groundY-118,86,118);
}
function hud(left,u){
  // countdown — BIG, on canvas, always visible (the mobile fix)
  if(G.state==='run'){
    const warn=left<4;
    cx.fillStyle=warn?(Math.floor(G.t*5)%2?'#ff5d5d':'#ffe1e1'):'#fff';
    cx.font=`900 ${warn?clamp(W*.16,52,92):clamp(W*.12,40,64)}px sans-serif`;
    cx.textAlign='center';cx.textBaseline='top';
    cx.fillText(Math.ceil(left),W/2,Math.max(14,H*.05));
    cx.font='700 13px sans-serif';cx.fillStyle='rgba(255,255,255,.75)';
    cx.fillText('TO THE MAMAD',W/2,Math.max(14,H*.05)+(warn?clamp(W*.16,52,92):clamp(W*.12,40,64))+2);
  }
  // progress bar to the door
  const bw=Math.min(W*.72,420),bx=(W-bw)/2,by=Math.max(8,H*.028);
  cx.fillStyle='rgba(13,17,32,.6)';r(bx-4,by-4,bw+8,16,8);
  cx.fillStyle='#46506b';r(bx,by,bw,8,4);
  cx.fillStyle=u>.62?'#ff5d5d':'#7ee8c7';r(bx,by,bw*clamp(G.prog/G.goal,0,1),8,4);
  drawEmoji('🛡️',bx+bw+16,by+4,18);
  cx.save();cx.translate(bx+bw*clamp(G.prog/G.goal,0,1),by+4);cx.scale(-1,1);
  drawEmoji('🏃',0,0,16);cx.restore();
  // wave + coins pills
  cx.font='800 15px sans-serif';cx.textAlign='left';cx.textBaseline='middle';
  const py=Math.max(30,H*.028+26);
  pill(12,py,`🚨 ${G.wave}`,'#ffb4b4');
  pill(12,py+34,`💸 ${G.coins}₪`,'#ffd166');
}
function pill(x,y,txt,col){
  const w=cx.measureText(txt).width+24;
  cx.fillStyle='rgba(13,17,32,.62)';r(x,y,w,28,14);
  cx.fillStyle=col;cx.fillText(txt,x+12,y+15);
}
function r(x,y,w,h,rad){cx.beginPath();
  if(cx.roundRect) cx.roundRect(x,y,w,h,rad); else cx.rect(x,y,w,h);
  cx.fill();}
function titleScene(){
  cx.save();cx.translate(W*.24,groundY-30);cx.scale(-1,1);
  drawEmoji('🏃',0,0,46);
  cx.save();cx.translate(-26,-9);cx.rotate(.3);drawEmoji('📱',0,0,17);cx.restore();
  cx.restore();
  drawEmoji('💨',W*.24-30,groundY-12,15);
  door(W*.72);
}
function insideScene(){
  cx.fillStyle='rgba(8,10,18,.78)';cx.fillRect(0,0,W,H);
  for(const rk of G.rockets){
    const t=rk.t;
    if(t<.65){ drawEmoji('🚀',rk.x+t*240,rk.y-t*180,30); drawEmoji('☄️',W*.9-t*340,H*.08+t*260,26); }
    else if(t<1.1) drawEmoji('💥',W*.62,H*.3,70+Math.sin(t*30)*8);
  }
  cx.fillStyle='#7ee8c7';cx.font=`900 ${clamp(W*.07,26,40)}px sans-serif`;cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText('INSIDE THE MAMAD 🛡️',W/2,H*.6);
  cx.fillStyle='#ffd166';cx.font='800 18px sans-serif';
  cx.fillText(`+${20+G.wave*5}₪ calm under fire · siren #${G.wave} survived`,W/2,H*.6+44);
  cx.fillStyle='rgba(255,255,255,.6)';cx.font='600 14px sans-serif';
  cx.fillText('boom outside… Iron Dome has it. Next one is faster.',W/2,H*.6+76);
}

/* ---------------- main loop (error-contained, never dies) ---------------- */
let lastT=performance.now();
function loop(now){
  requestAnimationFrame(loop);
  const dt=Math.min(.05,(now-lastT)/1000);lastT=now;
  try{ update(dt); draw(); }catch(err){ console.error(err); }
}
$('titleBest').textContent=G.best.sirens?`Best: ${G.best.sirens} sirens · ${G.best.coins}₪`:'';
requestAnimationFrame(loop);
</script>
</body>
