<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a1226">
<meta name="description" content="Iron Dome — a light arcade game. Tap the rockets before they land. Works offline.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>כיפת ברזל · Iron Dome</title>
<style>
  :root{
    --bg:#0a1226; --panel:#101b38; --panel2:#16244a;
    --cyan:#3ee6ff; --gold:#ffd166; --red:#ff5d73; --green:#5dffa8;
    --ink:#eaf2ff; --dim:#8da3cc;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;overscroll-behavior:none}
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Heebo",Arial,sans-serif;
    touch-action:manipulation; user-select:none; -webkit-user-select:none;
  }
  #game{position:fixed;inset:0;display:block;touch-action:none}

  /* ---------- HUD ---------- */
  #hud{
    position:fixed;top:0;left:0;right:0;display:none;justify-content:space-between;
    align-items:flex-start;padding:calc(env(safe-area-inset-top,0px) + 10px) 12px 0;
    pointer-events:none;z-index:5;
    direction:ltr;   /* pause stays top-right in both languages */
  }
  .hudbox{
    background:rgba(10,18,38,.65);border:1px solid rgba(62,230,255,.25);
    border-radius:12px;padding:6px 12px;backdrop-filter:blur(4px);
  }
  #hudScore{font-family:"Courier New",monospace;font-weight:700;font-size:20px;color:var(--cyan);
    text-shadow:0 0 12px rgba(62,230,255,.7);letter-spacing:1px}
  #hudCombo{font-size:12px;color:var(--gold);font-weight:700;min-height:14px}
  #hudLevel{font-size:12px;color:var(--dim);text-align:center}
  #hudWave{font-size:13px;color:var(--ink);font-weight:600;text-align:center}
  #btnPause{pointer-events:auto;background:rgba(10,18,38,.65);border:1px solid rgba(62,230,255,.25);
    color:var(--ink);border-radius:12px;font-size:18px;padding:10px 16px;min-height:44px;min-width:44px;cursor:pointer}

  /* ---------- Overlay screens ---------- */
  .screen{
    position:fixed;inset:0;display:none;flex-direction:column;align-items:center;
    justify-content:center;gap:14px;z-index:10;padding:24px;text-align:center;
    background:radial-gradient(ellipse at 50% 30%,rgba(22,36,74,.92),rgba(10,18,38,.97));
  }
  .screen.show{display:flex}
  h1{
    font-family:"Courier New",monospace;font-weight:700;font-size:clamp(26px,7vw,44px);
    letter-spacing:2px;color:var(--cyan);text-shadow:0 0 18px rgba(62,230,255,.8),0 0 60px rgba(62,230,255,.35);
  }
  h1 small{display:block;font-size:.45em;color:var(--gold);letter-spacing:6px;margin-top:6px;
    text-shadow:0 0 14px rgba(255,209,102,.6)}
  .sub{color:var(--dim);font-size:14px;max-width:420px;line-height:1.5}
  .btn{
    background:linear-gradient(180deg,#1d3a7a,#142a5c);color:var(--ink);
    border:1px solid rgba(62,230,255,.5);border-radius:14px;font-size:18px;font-weight:700;
    padding:14px 38px;cursor:pointer;letter-spacing:1px;min-width:220px;
    box-shadow:0 0 18px rgba(62,230,255,.25), inset 0 1px 0 rgba(255,255,255,.12);
    transition:transform .08s;
  }
  .btn:active{transform:scale(.96)}
  .btn.primary{background:linear-gradient(180deg,#0fb3cf,#0b7e98);border-color:var(--cyan);
    box-shadow:0 0 26px rgba(62,230,255,.55)}
  .btn.small{font-size:14px;padding:9px 18px;min-width:0;min-height:44px}
  .btnrow{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
  .pill{background:var(--panel2);border:1px solid rgba(141,163,204,.35);color:var(--dim);
    border-radius:999px;padding:10px 18px;font-size:13px;min-height:44px;cursor:pointer}
  .pill.on{color:var(--ink);border-color:var(--cyan);box-shadow:0 0 10px rgba(62,230,255,.3)}
  .stat{font-family:"Courier New",monospace;font-size:16px;color:var(--ink)}
  .stat b{color:var(--gold)}
  .stars{font-size:34px;letter-spacing:8px;color:var(--gold);text-shadow:0 0 16px rgba(255,209,102,.7)}
  .bigscore{font-family:"Courier New",monospace;font-size:34px;color:var(--cyan);
    text-shadow:0 0 16px rgba(62,230,255,.7)}
  #levelTitle{color:var(--gold);font-size:22px;font-weight:800;letter-spacing:1px}
  .note{font-size:11px;color:var(--dim);opacity:.8;max-width:380px;line-height:1.5;
    position:absolute;bottom:calc(env(safe-area-inset-bottom,0px) + 12px);left:0;right:0;margin:auto}

  /* ---------- Upgrades ---------- */
  #shop,.shoplist{display:flex;flex-direction:column;gap:8px;width:min(92vw,420px)}
  .up{
    display:flex;align-items:center;gap:10px;background:var(--panel);
    border:1px solid rgba(62,230,255,.2);border-radius:12px;padding:10px 12px;text-align:start;
  }
  .up .ic{font-size:24px;width:34px;text-align:center}
  .up .nm{font-weight:700;font-size:14px}
  .up .ds{font-size:13px;color:var(--dim)}
  .up .tiers{font-size:11px;color:var(--cyan);letter-spacing:2px}
  .up .info{flex:1;min-width:0}
  .up button{
    background:linear-gradient(180deg,#27498f,#1d3a7a);border:1px solid rgba(255,209,102,.6);color:var(--gold);
    border-radius:10px;padding:10px 14px;min-height:44px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;
    box-shadow:0 0 8px rgba(255,209,102,.25), inset 0 1px 0 rgba(255,255,255,.1);
  }
  .up button:disabled{opacity:.35;border-color:var(--dim);color:var(--dim)}
  #coins{font-family:"Courier New",monospace;color:var(--gold);font-size:18px;font-weight:700;
    text-shadow:0 0 10px rgba(255,209,102,.5)}

  /* calibration target */
  #calTarget{position:absolute;width:64px;height:64px;display:none;pointer-events:none;
    font-size:50px;line-height:64px;text-align:center;
    filter:drop-shadow(0 0 16px rgba(255,93,115,.95));
    transform:rotate(135deg);transition:left .25s,top .25s}

  /* how to play */
  .howrow{display:flex;align-items:center;gap:12px;background:var(--panel);border-radius:12px;
    padding:8px 14px;width:min(92vw,400px);text-align:start}
  .howrow .e{font-size:24px}
  .howrow .t{font-size:13px;color:var(--ink);line-height:1.4}
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="hud">
  <div class="hudbox">
    <div id="hudScore">0</div>
    <div id="hudCombo"></div>
  </div>
  <div class="hudbox">
    <div id="hudWave"></div>
    <div id="hudLevel"></div>
  </div>
  <button id="btnPause">⏸</button>
</div>

<!-- ===== MENU ===== -->
<div id="scrMenu" class="screen show">
  <h1 data-i18n="title">כיפת ברזל<small>IRON DOME</small></h1>
  <p class="sub" data-i18n="tagline"></p>
  <button class="btn primary" id="btnPlay"></button>
  <button class="btn" id="btnEndless" style="display:none;border-color:rgba(255,93,115,.6);box-shadow:0 0 18px rgba(255,93,115,.3)"></button>
  <button class="btn" id="btnHow"></button>
  <div class="btnrow">
    <button class="pill" id="btnCal">🎯</button>
    <button class="pill" id="btnLang">EN</button>
    <button class="pill on" id="btnSound">🔊</button>
  </div>
  <div class="stat" id="menuBest"></div>
  <p class="note" data-i18n="disclaimer"></p>
</div>

<!-- ===== HOW TO ===== -->
<div id="scrHow" class="screen">
  <h1 style="font-size:24px" data-i18n="howTitle"></h1>
  <div class="howrow"><span class="e">🚀</span><span class="t" data-i18n="how1"></span></div>
  <div class="howrow"><span class="e">👆</span><span class="t" data-i18n="how2"></span></div>
  <div class="howrow"><span class="e">🎁</span><span class="t" data-i18n="how3"></span></div>
  <div class="howrow"><span class="e">🏙️</span><span class="t" data-i18n="how4"></span></div>
  <div class="howrow"><span class="e">⭐</span><span class="t" data-i18n="how5"></span></div>
  <button class="btn primary" id="btnHowBack"></button>
</div>

<!-- ===== CALIBRATION ===== -->
<div id="scrCal" class="screen">
  <h1 style="font-size:22px" data-i18n="calTitle"></h1>
  <p class="sub" id="calMsg"></p>
  <div class="sub" id="calStep" style="font-size:18px;color:var(--gold)"></div>
  <div id="calTarget">🚀</div>
  <button class="btn small" id="btnCalSkip" style="margin-top:30vh"></button>
</div>

<!-- ===== LEVEL INTRO ===== -->
<div id="scrIntro" class="screen">
  <div id="hudLevelIntro" class="sub"></div>
  <div id="levelTitle"></div>
  <div class="sub" id="levelHint"></div>
  <button class="btn primary" id="btnStart"></button>
</div>

<!-- ===== PAUSE ===== -->
<div id="scrPause" class="screen">
  <h1 style="font-size:26px" data-i18n="paused"></h1>
  <button class="btn primary" id="btnResume"></button>
  <button class="btn" id="btnQuit"></button>
  <div class="btnrow">
    <button class="pill" id="btnSound2">🔊</button>
  </div>
</div>

<!-- ===== LEVEL END / SHOP ===== -->
<div id="scrEnd" class="screen">
  <div class="stars" id="endStars"></div>
  <div id="endTitle" style="font-size:22px;font-weight:800;color:var(--ink)"></div>
  <div class="stat" id="endStats"></div>
  <div id="coins"></div>
  <div id="shop"></div>
  <div class="btnrow">
    <button class="btn primary" id="btnNext"></button>
    <button class="btn small" id="btnRetry"></button>
    <button class="btn small" id="btnMenu1"></button>
  </div>
</div>

<!-- ===== GAME OVER ===== -->
<div id="scrOver" class="screen">
  <h1 style="font-size:24px;color:var(--gold);text-shadow:0 0 18px rgba(255,209,102,.7)" data-i18n="overTitle"></h1>
  <div class="bigscore" id="overScore"></div>
  <div class="sub" id="overStats"></div>
  <div id="coinsOver" style="font-family:'Courier New',monospace;color:var(--gold);font-size:16px;font-weight:700"></div>
  <div id="shopOver" class="shoplist"></div>
  <div class="btnrow">
    <button class="btn primary" id="btnRetry2"></button>
    <button class="btn" id="btnMenu2"></button>
  </div>
</div>

<!-- ===== VICTORY ===== -->
<div id="scrWin" class="screen">
  <h1 style="font-size:28px;color:var(--gold);text-shadow:0 0 20px rgba(255,209,102,.8)" data-i18n="winTitle"></h1>
  <p class="sub" data-i18n="winSub"></p>
  <div class="bigscore" id="winScore"></div>
  <button class="btn primary" id="btnMenu3"></button>
</div>

<script>
'use strict';
/* =========================================================
   IRON DOME — light arcade interceptor game
   Single-file, offline-first PWA. No external assets.
   ========================================================= */

const $ = id => document.getElementById(id);

/* ---------- persistence ---------- */
const SAVE_KEY = 'irondome.save.v1';
let _stored = {};
try { _stored = JSON.parse(localStorage.getItem(SAVE_KEY) || '{}') || {}; } catch (e) {}  // corrupt save must never brick boot
const save = Object.assign({
  lang: 'he', sound: true, coins: 0, best: 0, unlocked: 0,
  cal: { x: 0, y: 0, done: false },
  up: { blast: 0, speed: 0, launchers: 0, sling: 0 }
}, _stored);
/* harden against partial/legacy/typed-wrong saves: every field the game does
   math with must come out numeric, or firing breaks (NaN tube counts) */
save.up = Object.assign({ blast: 0, speed: 0, launchers: 0, sling: 0 }, save.up);
for (const k in save.up) save.up[k] = +save.up[k] || 0;
if (!save.cal) save.cal = { x: 0, y: 0, done: false };
save.cal.x = +save.cal.x || 0; save.cal.y = +save.cal.y || 0;
save.coins = +save.coins || 0; save.best = +save.best || 0; save.unlocked = +save.unlocked || 0;
function persist(){ localStorage.setItem(SAVE_KEY, JSON.stringify(save)); }

/* ---------- i18n ---------- */
const T = {

    how4: 'Every rocket that lands destroys a building. Lose all buildings and the round is over.',
    how5: 'Earn ⭐ and coins to buy upgrades — bigger blasts, faster missiles, extra launchers and the Iron Sling.',
    level: 'LEVEL', start: 'DEFEND', paused: 'PAUSED', resume: 'RESUME', quit: 'MAIN MENU',
    next: 'NEXT LEVEL ▶', retry: 'RETRY', menu: 'MENU',
    cleared: 'AREA DEFENDED!', failedLv: 'The city took too many hits…',
    intercepted: 'Intercepted', saved: 'Buildings saved', scoreW: 'Score', bestW: 'Best',
    coinsW: 'Coins', maxed: 'MAX', buy: 'Upgrade',
    overTitle: 'THE DOME NEEDS YOU!', overStats: 'You intercepted {n} rockets. Reload and get back out there!',
    endless: '🚨 RED ALERT — Endless', endlessName: 'RED ALERT',
    winTitle: '🏆 ALL CLEAR!', winSub: 'You defended every city, from Sderot to Eilat. Total protection.',
    upBlast: 'Bigger Blast', upBlastD: 'Bigger tap hitbox & chain blasts',
    upSpeed: 'Quick Fuse', upSpeedD: 'Longer combo window',
    upLaunch: 'City Armor', upLaunchD: 'Buildings survive +1 hit',
    upSling: 'Iron Sling', upSlingD: 'Auto-intercepts leakers (per level)',
    waveOf: 'Rockets', comboX: 'COMBO x', tapHint: '👆 TAP THE ROCKETS!', direct: 'DIRECT HIT!',
    calTitle: 'Touch Calibration', calTapMsg: 'Tap the center of the rocket',
    calFlingMsg: 'Now swipe through the rocket', calCloser: 'Closer to the rocket — try again',
    calDoneMsg: 'Calibrated! Taps are tuned to your thumb — and keep improving as you play.', skip: 'Skip',
    pSlow: 'SLOW-MO!', pMega: 'MEGA BLAST!', pShield: 'SHIELD UP!', pBeam: 'IRON BEAM!',
    slingShot: 'IRON SLING!',
    disclaimer: 'A fan-made morale game — not affiliated with any official body. In a real alert, follow Home Front Command instructions. Stay safe ❤️',
    levels: ['Sderot','Ashkelon','Ashdod','Beer Sheva','Rishon LeZion','Tel Aviv','Netanya','Jerusalem','Haifa','Eilat'],
    hints: [
      'Where it all begins. Easy skies — warm up your tapping finger.',
      'Faster rockets join in. Stay on rhythm — tap each one right on the body.',
      'Heavy rockets take TWO taps — crack the armor, then pop them.',
      'The desert sky gets busy. Watch the edges.',
      'Swerving rockets! They zigzag on the way down.',
      'The big city. Splitters break into two — pop them high!',
      'Coastal winds: everything moves quicker here.',
      'Defend the old stone city. Mixed barrages incoming.',
      'Port under fire — heavy + fast combos. Use power-ups.',
      'The final stand in the south. Everything at once. 💪'
    ]
  },
  he: {
    title: 'כיפת ברזל', dir: 'rtl',
    tagline: 'רקטות נופלות מהשמיים — לחצו עליהן לפני שהן מגיעות לעיר. סבבים קצרים, עובד גם בלי אינטרנט.',
    play: '▶ שחקו', howBtn: 'איך משחקים', back: 'חזרה',
    howTitle: 'איך משחקים',
    how1: 'רקטות נופלות מהשמיים. הגדולות איטיות, הקטנות מהירות — חלקן מתפצלות או מתפתלות.',
    how2: 'לחצו ישר על רקטה כדי ליירט — תפסו את החוד לבונוס פגיעה ישירה! כבדות צריכות שתי לחיצות; החטאה עולה בקומבו.',
    how3: 'לחצו על ארגזים נופלים 🎁 לאסוף כוחות: הילוך איטי, פיצוץ ענק, כיפת מגן וקרן לייזר.',
    how4: 'כל רקטה שנוחתת הורסת בניין. נגמרו הבניינים — נגמר הסיבוב.',
    how5: 'אספו ⭐ ומטבעות לשדרוגים — פיצוץ גדול יותר, טילים מהירים, משגר נוסף וקלע ברזל.',
    level: 'שלב', start: 'להגן!', paused: 'הפסקה', resume: 'המשך', quit: 'תפריט ראשי',

    overTitle: 'הכיפה צריכה אתכם!', overStats: 'יירטתם {n} רקטות. טוענים מחדש ויוצאים שוב!',
    endless: '🚨 צבע אדום — אינסופי', endlessName: 'צבע אדום',
    winTitle: '🏆 הכל נקי!', winSub: 'הגנתם על כל הערים, משדרות ועד אילת. הגנה מושלמת.',
    upBlast: 'פיצוץ גדול יותר', upBlastD: 'אזור פגיעה גדול יותר ופיצוצי שרשרת',
    upSpeed: 'פתיל מהיר', upSpeedD: 'חלון קומבו ארוך יותר',
    upLaunch: 'שריון לעיר', upLaunchD: 'בניינים סופגים פגיעה נוספת',
    upSling: 'קלע ברזל', upSlingD: 'יירוט אוטומטי של מסתננות (לכל שלב)',
    waveOf: 'רקטות', comboX: 'קומבו ×', tapHint: '👆 לחצו על הרקטות!', direct: 'פגיעה ישירה!',
    calTitle: 'כיול מגע', calTapMsg: 'לחצו במרכז הרקטה',
    calFlingMsg: 'עכשיו החליקו דרך הרקטה', calCloser: 'קרוב יותר לרקטה — נסו שוב',
    calDoneMsg: 'כויל! הלחיצות מכווננות לאצבע שלכם — וממשיכות להשתפר תוך כדי משחק.', skip: 'דלג',
    pSlow: 'הילוך איטי!', pMega: 'מגה פיצוץ!', pShield: 'מגן פעיל!', pBeam: 'קרן ברזל!',
    slingShot: 'קלע ברזל!',
    disclaimer: 'משחק מעריצים להרמת מורל — לא קשור לגוף רשמי. באזעקה אמיתית פעלו לפי הנחיות פיקוד העורף. שמרו על עצמכם ❤️',
    levels: ['שדרות','אשקלון','אשדוד','באר שבע','ראשון לציון','תל אביב','נתניה','ירושלים','חיפה','אילת'],
    hints: [
      'כאן הכל מתחיל. שמיים רגועים — תחממו את האצבע.',
      'רקטות מהירות מצטרפות. שמרו על הקצב — לחצו על כל אחת ישר על הגוף.',
      'רקטות כבדות צריכות שתי לחיצות — סדקו את השריון ואז פוצצו.',
      'שמי המדבר מתמלאים. שימו לב לקצוות.',
      'רקטות מתפתלות! הן עושות זיגזג בדרך למטה.',
      'העיר הגדולה. מתפצלות נשברות לשתיים — תפסו אותן גבוה!',
      'רוחות חוף: הכל זז מהר יותר כאן.',
      'מגינים על עיר האבן. מטחים מעורבים בדרך.',

};
function t(k){ return T[save.lang][k]; }

/* ---------- level definitions ---------- */
/* count: rockets in level · gap: base seconds between spawns · speed: multiplier
   weights: [normal, fast, heavy, zigzag, splitter] · scene picks the city backdrop */
const LEVELS = [
  { count: 12, gap: 1.6, speed: 0.80, weights:[1.0,0,0,0,0],          accent:'#ffb46b', scene:'sderot'    },

/* ---------- audio (synth, no assets) ---------- */
let AC = null;
function ac(){ if(!AC) AC = new (window.AudioContext||window.webkitAudioContext)(); if(AC.state==='suspended') AC.resume(); return AC; }
function tone(f0, f1, dur, type, vol, when){
  if (!save.sound) return;
  try{
    const a = ac(), o = a.createOscillator(), g = a.createGain(), t0 = a.currentTime + (when||0);
    o.type = type; o.frequency.setValueAtTime(f0, t0);
    o.frequency.exponentialRampToValueAtTime(Math.max(1,f1), t0+dur);
    g.gain.setValueAtTime(vol, t0); g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
    o.connect(g).connect(a.destination); o.start(t0); o.stop(t0+dur+0.02);
  }catch(e){}
}
function noise(dur, vol){
  if (!save.sound) return;
  try{
    const a = ac(), n = Math.floor(a.sampleRate*dur), buf = a.createBuffer(1,n,a.sampleRate), d = buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i] = (Math.random()*2-1)*(1-i/n);
    const s = a.createBufferSource(), g = a.createGain();
    s.buffer = buf; g.gain.value = vol; s.connect(g).connect(a.destination); s.start();
  }catch(e){}
}
const sfx = {
  launch(){ tone(900, 300, 0.18, 'sawtooth', 0.05); },
  boom(){ noise(0.25, 0.20); tone(160, 40, 0.3, 'triangle', 0.25); },

let curLevel = 0;

function newGame(levelIdx, endless){
  // Red Alert: unlocked after the campaign — an open-ended barrage that ramps
  // every 20s until the city falls. The 'best' score finally has a real chase.
  const L = endless
    ? { count: Infinity, gap: 1.25, speed: 1.15,
        weights: [0.35, 0.25, 0.15, 0.1, 0.15],
        accent: '#ff8a8a',
        scene: LEVELS[Math.floor(Math.random() * LEVELS.length)].scene }
    : LEVELS[levelIdx];
  G = {
    L, levelIdx, endless: !!endless, endlessT: 0, nextRamp: 20,
    rockets: [], inters: [], booms: [], parts: [], pows: [], floats: [], warns: [],
    spawned: 0, resolved: 0, killed: 0,
    spawnT: 0.6, powT: 6 + Math.random()*5,
    score: 0, combo: 0, comboT: 0,
    buildings: [], shake: 0,
    timeScale: 1, slowT: 0, megaT: 0, shieldT: 0,
    sling: save.up.sling,           // auto-intercept charges this level
    over: false, won: false, doneT: 0,
    beamFx: 0
  };
  buildSkyline();
  renderBackdrop();
}

function buildSkyline(){
  if (!G) return;
  const prev = G.buildings;
  const n = 7, bw = W / (n + 2);
  const arr = [];
  // deterministic-ish heights per level
  for (let i = 0; i < n; i++){
    // NB: multiplier must stay away from k*PI or the level term cancels and
    // every city gets an identical skyline; index shuffle breaks the staircase
    const r = Math.abs(Math.sin((G.levelIdx + 1) * 41.3 + ((i * 3 + G.levelIdx) % n) * 12.3));
    arr.push({
      x: bw * (i + 1) + bw * 0.08, w: bw * 0.84,
      h: 48 + r * Math.min(105, H * 0.13),
      alive: prev[i] ? prev[i].alive : true,
      hp: prev[i] ? prev[i].hp : 1 + save.up.launchers,   // 'City Armor' upgrade
      win: 2 + Math.floor(r * 3)
    });
  }
  G.buildings = arr;
}

/* ---------- city backdrop: per-level skyline & topography ----------
   Rendered once per level/resize into an offscreen canvas, then blitted
   each frame — keeps the scenery rich without costing mobile framerate. */
const BD = document.createElement('canvas');
function hexA(h, a){
  return 'rgba(' + parseInt(h.slice(1,3),16) + ',' + parseInt(h.slice(3,5),16) + ',' +
         parseInt(h.slice(5,7),16) + ',' + a + ')';
}
function renderBackdrop(){
  if (!G || !W || !H) return;
  BD.width = W * DPR; BD.height = H * DPR;
  const b = BD.getContext('2d');
  b.setTransform(DPR, 0, 0, DPR, 0, 0);
  const acc = G.L.accent;
  const FAR = '#1b2f60', MID = '#24407e', NEAR = '#2f519c';
  const topoH = Math.min(H * 0.30, 300);   // scenery fills the bottom third
  const T = GROUND - topoH;
  const rnd = i => Math.abs(Math.sin((G.levelIdx + 2) * 39.7 + i * 17.31));

  const poly = (pts, col) => {
    b.fillStyle = col; b.beginPath(); b.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length; i++) b.lineTo(pts[i][0], pts[i][1]);
    b.closePath(); b.fill();
  };
  const rect = (x, y, w, h, col) => { b.fillStyle = col; b.fillRect(x, y, w, h); };
  function ridge(col, yb, amp, f){                 // rolling hills / dunes
    b.fillStyle = col; b.beginPath(); b.moveTo(0, GROUND + 2);
    for (let x = 0; x <= W; x += 6)
      b.lineTo(x, yb - (Math.sin(x * f) * 0.6 + Math.sin(x * f * 2.7 + 2) * 0.4) * amp);
    b.lineTo(W, GROUND + 2); b.closePath(); b.fill();
  }
  function peaks(col, yb, amp, s){                 // jagged desert mountains
    b.fillStyle = col; b.beginPath(); b.moveTo(0, GROUND + 2);
    const n = 9;
    for (let i = 0; i <= n; i++)
      b.lineTo(W * i / n, yb - (i % 2 ? 0.45 + rnd(i + s) * 0.55 : 0.05 + rnd(i + s + 30) * 0.2) * amp);
    b.lineTo(W, GROUND + 2); b.closePath(); b.fill();
  }
  function sea(y0){                                 // mediterranean / red sea band
    const g = b.createLinearGradient(0, y0, 0, GROUND);
    g.addColorStop(0, 'rgba(62,230,255,0.10)'); g.addColorStop(1, 'rgba(62,230,255,0.02)');
    b.fillStyle = g; b.fillRect(0, y0, W, GROUND - y0);
    b.strokeStyle = 'rgba(62,230,255,0.35)'; b.lineWidth = 1;
    b.beginPath(); b.moveTo(0, y0); b.lineTo(W, y0); b.stroke();
    // moonlight shimmer dashes so it reads as water, not fog
    b.strokeStyle = 'rgba(62,230,255,0.5)'; b.lineWidth = 1.5;
    for (let i = 0; i < 6; i++){
      const sy = y0 + 6 + rnd(i + 200) * (GROUND - y0) * 0.5;
      const sx2 = rnd(i + 210) * (W - 30);
      b.beginPath(); b.moveTo(sx2, sy); b.lineTo(sx2 + 10 + rnd(i + 220) * 14, sy); b.stroke();
    }
  }
  function blocks(col, hMin, hMax, n, s){           // generic skyline strip
    for (let i = 0; i < n; i++){
      const w = W / n, h = hMin + rnd(i + s) * (hMax - hMin);
      rect(i * w + w * 0.08, GROUND - h, w * 0.84, h, col);
    }
  }
  function lights(n, s){                            // sprinkle of lit windows
    b.fillStyle = acc; b.globalAlpha = 0.85;
    for (let i = 0; i < n; i++)
      b.fillRect(rnd(i + s) * W, GROUND - 8 - rnd(i + s + 99) * topoH * 0.45, 3, 3);
    b.globalAlpha = 1;
  }
  function crane(x, h, col){                        // port crane
    rect(x, GROUND - h, 5, h, col);
    rect(x - h * 0.45, GROUND - h, h * 0.8, 4, col);
    rect(x - h * 0.32, GROUND - h + 4, 2, h * 0.3, col);
  }
  function waterTower(x, h, col){
    rect(x - 2, GROUND - h, 4, h, col);
    b.fillStyle = col;
    b.beginPath(); b.ellipse(x, GROUND - h, 13, 9, 0, 0, 6.29); b.fill();
  }
  function cypress(x, h, col){ poly([[x, GROUND - h], [x + 4, GROUND], [x - 4, GROUND]], col); }
  function palm(x, h, col){
    rect(x - 2, GROUND - h, 4, h, col);
    b.strokeStyle = col; b.lineWidth = 3; b.lineCap = 'round';
    for (let a = 0; a < 5; a++){
      const dx = Math.cos(a * 1.25 + 0.4);
      b.beginPath(); b.moveTo(x, GROUND - h);
      b.quadraticCurveTo(x + dx * 16, GROUND - h - 12, x + dx * 30, GROUND - h + 4);
      b.stroke();
    }
  }
  function goldDome(x, r, baseY){                   // jerusalem gold dome
    rect(x - r * 0.9, baseY - r * 2.1, r * 1.8, r * 2.1, NEAR);
    b.fillStyle = '#d9a93a';
    b.beginPath(); b.arc(x, baseY - r * 2.1, r, Math.PI, 0); b.fill();
    poly([[x - 2, baseY - r * 3.1], [x + 2, baseY - r * 3.1], [x, baseY - r * 3.6]], '#d9a93a');
  }
  function oldWall(y, h){                           // crenellated old-city wall
    rect(0, y - h, W, h, NEAR);
    b.fillStyle = NEAR;
    for (let x = 6; x < W; x += 24) b.fillRect(x, y - h - 7, 13, 7);
    b.fillStyle = '#0d1a3c';
    b.beginPath(); b.arc(W * 0.3, y, h * 0.55, Math.PI, 0); b.fill();  // gate arch
  }

  switch (G.L.scene){
    case 'sderot':       // low western-negev town: dunes, water tower, cypress
      ridge(FAR, T + topoH * 0.45, topoH * 0.30, 0.008);
      ridge(MID, T + topoH * 0.72, topoH * 0.22, 0.013);
      blocks(NEAR, 10, 30, 14, 3);
      waterTower(W * 0.2, topoH * 0.8, NEAR);
      cypress(W * 0.55, 28, NEAR); cypress(W * 0.61, 22, NEAR); cypress(W * 0.86, 26, NEAR);
      lights(14, 5);
      break;
    case 'ashkelon':     // coast: sea, marina masts, beach hotels
      sea(T + topoH * 0.35);
      blocks(MID, 18, 60, 11, 7);
      for (let i = 0; i < 4; i++) rect(W * (0.14 + i * 0.05), GROUND - 30 - i * 5, 2, 30 + i * 5, NEAR);
      blocks(NEAR, 10, 32, 16, 11);
      lights(18, 8);
      break;
    case 'ashdod':       // port city: cranes + container stacks
      sea(T + topoH * 0.3);
      blocks(MID, 20, 55, 10, 13);
      crane(W * 0.72, topoH * 0.7, NEAR);
      crane(W * 0.84, topoH * 0.62, NEAR);
      crane(W * 0.93, topoH * 0.55, NEAR);
      for (let i = 0; i < 8; i++)
        rect(W * 0.66 + (i % 4) * 16, GROUND - 10 - Math.floor(i / 4) * 9, 14, 8, NEAR);
      blocks(NEAR, 10, 28, 14, 17);
      lights(16, 19);
      break;
    case 'beersheva':    // negev capital: dunes + one tall tower
      ridge(FAR, T + topoH * 0.4, topoH * 0.35, 0.006);
      ridge(MID, T + topoH * 0.7, topoH * 0.25, 0.011);
      rect(W * 0.7, GROUND - topoH * 0.85, W * 0.045, topoH * 0.85, NEAR);
      blocks(NEAR, 10, 34, 13, 23);
      cypress(W * 0.3, 24, NEAR); cypress(W * 0.35, 18, NEAR);
      lights(15, 25);
      break;
    case 'rishon':       // dense suburb rows on gentle hills
      ridge(FAR, T + topoH * 0.5, topoH * 0.25, 0.009);
      blocks(MID, 24, 62, 10, 29);
      blocks(NEAR, 12, 36, 16, 31);
      waterTower(W * 0.85, topoH * 0.6, NEAR);
      lights(20, 33);
      break;
    case 'telaviv': {    // the big city: sea + dense towers, azrieli trio
      sea(T + topoH * 0.25);
      blocks(MID, 35, topoH * 0.8, 12, 37);
      const bw = W * 0.052, bx = W * 0.40, bh = topoH * 0.95;
      rect(bx, GROUND - bh * 0.92, bw, bh * 0.92, NEAR);                       // square
      rect(bx + bw * 1.35, GROUND - bh, bw, bh, NEAR);                          // round
      b.fillStyle = NEAR;
      b.beginPath(); b.arc(bx + bw * 1.85, GROUND - bh, bw / 2, Math.PI, 0); b.fill();
      poly([[bx + bw * 2.7, GROUND], [bx + bw * 3.7, GROUND],                   // triangle
            [bx + bw * 3.2, GROUND - bh * 0.85]], NEAR);
      rect(bx + bw * 1.55, GROUND - bh - 22, 2.5, 22, NEAR);                    // antenna
      blocks(NEAR, 14, 40, 18, 41);
      lights(26, 43);
      break;
    }
    case 'netanya':      // cliff over the beach, hotel slabs on top
      sea(T + topoH * 0.45);
      poly([[0, GROUND + 2], [0, T + topoH * 0.42], [W * 0.42, T + topoH * 0.5],
            [W * 0.52, GROUND + 2]], MID);
      for (let i = 0; i < 5; i++)
        rect(W * (0.04 + i * 0.08), T + topoH * 0.46 - 26 - rnd(i + 47) * 18,
             W * 0.06, 26 + rnd(i + 47) * 18, NEAR);
      blocks(NEAR, 10, 30, 12, 49);
      lights(16, 51);
      break;
    case 'jerusalem': {  // hills, elevated old-city wall + gold dome on the ridge
      ridge(FAR, T + topoH * 0.38, topoH * 0.32, 0.007);
      ridge(MID, T + topoH * 0.62, topoH * 0.26, 0.010);
      const ridgeY = GROUND - topoH * 0.46;          // above the foreground buildings
      oldWall(ridgeY, 20);
      goldDome(W * 0.5, 20, ridgeY);
      rect(W * 0.66, ridgeY - 48, 9, 48, NEAR);                                 // bell tower
      poly([[W * 0.66, ridgeY - 48], [W * 0.702, ridgeY - 48], [W * 0.681, ridgeY - 60]], NEAR);
      cypress(W * 0.2, 30, NEAR); cypress(W * 0.25, 24, NEAR); cypress(W * 0.8, 28, NEAR);
      lights(14, 55);
      break;
    }
    case 'haifa': {      // mount carmel slope + gardens lights + port
      poly([[0, GROUND + 2], [0, T - 8], [W * 0.5, T + topoH * 0.3],
            [W * 0.72, GROUND + 2]], FAR);
      poly([[0, GROUND + 2], [0, T + topoH * 0.3], [W * 0.4, T + topoH * 0.55],
            [W * 0.6, GROUND + 2]], MID);
      b.fillStyle = '#d9a93a'; b.globalAlpha = 0.85;                            // gardens cascade
      for (let i = 0; i < 9; i++)
        b.fillRect(W * (0.10 + i * 0.022), T + topoH * (0.18 + i * 0.085), 3, 3);
      b.globalAlpha = 1;
      sea(T + topoH * 0.6);
      crane(W * 0.8, topoH * 0.55, NEAR);
      crane(W * 0.91, topoH * 0.48, NEAR);
      blocks(NEAR, 8, 26, 12, 59);
      lights(14, 61);
      break;
    }
    case 'eilat':        // RED mountains (Edom at night), the gulf, palms + sail hotels
      peaks('#3f2a45', T + topoH * 0.35, topoH * 0.55, 63);
      peaks('#553449', T + topoH * 0.6, topoH * 0.4, 67);
      sea(T + topoH * 0.68);
      poly([[W * 0.6, GROUND], [W * 0.74, GROUND], [W * 0.63, GROUND - topoH * 0.5]], NEAR);  // sail hotel
      blocks(NEAR, 10, 30, 12, 69);
      palm(W * 0.16, 34, NEAR); palm(W * 0.86, 30, NEAR);
      lights(14, 71);
      break;
  }

  // soft city-glow rising from the skyline
  const glow = b.createLinearGradient(0, T - 50, 0, GROUND);
  glow.addColorStop(0, 'rgba(0,0,0,0)');
  glow.addColorStop(1, hexA(acc, 0.17));
  b.fillStyle = glow; b.fillRect(0, T - 50, W, GROUND - T + 50);
}

/* interceptor params with upgrades */
function blastR(){ return (54 + save.up.blast * 15) * (G && G.megaT > 0 ? 1.7 : 1); }
function comboWindow(){ return 2.2 + save.up.speed * 0.5; }   // 'Quick Fuse' upgrade: protect the streak

/* ---------- spawning ---------- */
function pickType(){
  const w = G.L.weights, r = Math.random();
  let acc = 0;
  for (let i = 0; i < w.length; i++){ acc += w[i]; if (r < acc) return i; }
  return 0;
}
/* type: 0 normal · 1 fast · 2 heavy · 3 zigzag · 4 splitter */
function spawnRocket(type, x, y, child){
  const sp = G.L.speed;
  const def = [
    { v: 65,  size: 16, hp: 1, col: '#ff5d73', pts: 10 },
    { v: 120, size: 12, hp: 1, col: '#ffd166', pts: 25 },
    { v: 45,  size: 24, hp: 2, col: '#ff8c42', pts: 40 },
    { v: 80,  size: 14, hp: 1, col: '#c792ff', pts: 30 },
    { v: 55,  size: 19, hp: 1, col: '#5dffa8', pts: 35 }
  ][type];
  const sx = x !== undefined ? x : W * (0.16 + Math.random() * 0.68);
  const tx = W * (0.18 + Math.random() * 0.64);   // always lands over the city strip
  const sy = y !== undefined ? y : -30;
  const ang = Math.atan2(GROUND - sy, tx - sx);
  // normalize to screen height so a tablet isn't 75% easier than a small phone;
  // tight speed variance keeps the falling rhythm hypnotic, not chaotic
  const v = def.v * sp * (0.95 + Math.random() * 0.12) * Math.min(1.3, Math.max(0.8, H / 844));
  G.rockets.push({
    type, x: sx, y: sy,
    vx: Math.cos(ang) * v, vy: Math.sin(ang) * v,
    size: def.size, hp: def.hp, col: def.col, pts: def.pts,
    t: Math.random() * 6.28, trail: [], child: !!child,
    split: type === 4 ? (GROUND * (0.3 + Math.random() * 0.25)) : -1
  });
}
function spawnPower(){
  // beam is the strongest crate — weight it rarest
  const roll = Math.random();
  const k = roll < 0.3 ? 'slow' : roll < 0.6 ? 'mega' : roll < 0.85 ? 'shield' : 'beam';
  G.pows.push({ k, x: W * (0.18 + Math.random() * 0.64), y: -30, vy: 42, t: 0,
    ic: { slow: '⏱️', mega: '💥', shield: '🛡️', beam: '⚡' }[k] });
}

/* ---------- input: tap the rocket itself ----------
   The whole game is your finger vs the rocket: tap directly ON one to
   intercept it (an interceptor streak zips up instantly — zero latency,
   the hit registers on touch-down). Catch the TIP for a DIRECT HIT bonus.
   A miss costs a combo tier. No auto-aim. */
/* map a pointer event to game coordinates: corrects for any CSS scaling of
   the canvas (zoomed viewports, embeds) and applies the player's calibration */
function evXY(e){
  const rect = cv.getBoundingClientRect();
  const sx = rect.width ? W / rect.width : 1, sy = rect.height ? H / rect.height : 1;
  return { x: (e.clientX - rect.left) * sx + save.cal.x,
           y: (e.clientY - rect.top) * sy + save.cal.y };
}
cv.addEventListener('pointerdown', e => {
  if (screen !== 'play' || !G || G.over) return;
  const pt = evXY(e), x = pt.x, y = pt.y;
  // collect power-up? (instant, consumes the gesture)
  for (let i = G.pows.length - 1; i >= 0; i--){
    const p = G.pows[i];
    if (Math.hypot(p.x - x, p.y - y) < 48){
      G.pows.splice(i, 1); applyPower(p.k);
      return;
    }
  }
  tapStrike(x, y);
});

/* finger-friendly hitbox: scales with rocket size, the Blast upgrade, and mega */
function hitR(r){
  return (Math.max(30, r.size * 2.1) + save.up.blast * 8) * (G.megaT > 0 ? 1.5 : 1);
}
function tapStrike(x, y){
  let best = null, bd = 1e9;
  for (const r of G.rockets){
    const d = Math.hypot(r.x - x, r.y - y);
    if (d < hitR(r) && d < bd){ bd = d; best = r; }
  }
  if (!best){
    // clean miss: a small dud ripple, and the combo drops one tier
    G.booms.push({ x, y, r: 2, maxR: 14, t: 0.3, dud: true });
    if (G.combo > 0){ G.combo = Math.max(0, G.combo - 3); }
    sfx.click();
    return;
  }
  if (bd < 80) learnCal(x - best.x, y - best.y);   // keep tuning to the thumb
  // instant interceptor streak from the battery (cosmetic — hit already counted)
  G.inters.push({ x1: W / 2, y1: GROUND - 20, x2: best.x, y2: best.y, t: 0 });
  sfx.launch(); buzz(10);
  // DIRECT HIT: caught it right on the nose cone
  const a = Math.atan2(best.vy, best.type === 3 ? best.vx + Math.sin(best.t) * 90 : best.vx);
  const tipD = Math.hypot(best.x + Math.cos(a) * best.size - x,
                          best.y + Math.sin(a) * best.size - y);
  best.hp--;
  if (best.hp <= 0){
    G.rockets.splice(G.rockets.indexOf(best), 1);
    if (tipD < best.size * 1.2){
      G.score += 15; G.combo++;
      addFloat(best.x, best.y - 26, t('direct'), '#ffffff', 15);
    }
    killRocket(best);
    G.booms.push({ x: best.x, y: best.y, r: 4, maxR: best.size * 1.6, t: 0, vis: true });  // pop visual
  } else {
    burst(best.x, best.y, '#ffffff', 8);
    best.vy *= 0.85;
    addFloat(best.x, best.y - 22, '🛡', '#ffffff', 14);
    sfx.combo(1);
  }
}

/* self-improving calibration: each tap that hits a rocket measures the
   residual between the (corrected) touch and the rocket itself, and nudges
   the offset with a moving average — accuracy keeps tightening as you play */
let calDirty = 0;
function learnCal(dx, dy){
  const c = v => Math.max(-60, Math.min(60, v));
  save.cal.x = c(save.cal.x - dx * 0.1);
  save.cal.y = c(save.cal.y - dy * 0.1);
  if (++calDirty >= 6){ calDirty = 0; persist(); }
}

function applyPower(k){
  sfx.power(); buzz(30);
  const msg = { slow: 'pSlow', mega: 'pMega', shield: 'pShield', beam: 'pBeam' }[k];
  addFloat(W / 2, H * 0.3, t(msg), '#ffd166', 22);
  if (k === 'slow') G.slowT = 4.5;
  if (k === 'mega') G.megaT = 8;
  if (k === 'shield') G.shieldT = 6;
  if (k === 'beam'){
    G.beamFx = 0.5; sfx.beam();
    for (const r of G.rockets) killRocket(r, true);
    G.rockets.length = 0;
  }
}

function addFloat(x, y, txt, col, sz, life){
  G.floats.push({ x, y, txt, col, sz: sz || 14, life: life || 1.1, t: 0 });
}

/* ---------- kill / scoring ---------- */
function killRocket(r, silent){
  G.killed++; G.resolved++;
  G.combo++; G.comboT = comboWindow();
  const mult = 1 + Math.min(4, Math.floor(G.combo / 3)) * 0.5;
  const pts = Math.round(r.pts * mult);
  G.score += pts;
  addFloat(r.x, r.y, '+' + pts, '#3ee6ff', 15);
  if (G.combo >= 3 && G.combo % 3 === 0){
    addFloat(W / 2, H * 0.22, t('comboX') + Math.floor(mult * 10) / 10, '#ffd166', 20);
    sfx.combo(Math.floor(G.combo / 3));
  }
  burst(r.x, r.y, r.col, 14);
  // chain reaction is the COMBO's reward, not a freebie — only while hot
  if (G.combo >= 3 && G.booms.length < 40)
    G.booms.push({ x: r.x, y: r.y, r: 4, maxR: blastR() * 0.55, t: 0, chain: true });
  if (!silent){ sfx.boom(); buzz(15); }
}

function burst(x, y, col, n){
  for (let i = 0; i < n; i++){
    const a = Math.random() * 6.28, v = 40 + Math.random() * 160;
    G.parts.push({ x, y, vx: Math.cos(a) * v, vy: Math.sin(a) * v, col, t: 0, life: 0.5 + Math.random() * 0.5 });
  }
}

/* ground impacts explode into falafel balls 🧆 — they arc, bounce and roll.
   Fewer + bigger + outlined reads as falafel; a halo reads as bokeh mush. */
function falafelBurst(x, n){
  const shades = ['#e0a955', '#c98f3d', '#b07a30', '#edbb6a'];
  for (let i = 0; i < n; i++){
    const a = -Math.PI / 2 + (Math.random() - 0.5) * 2.0;
    const v = 160 + Math.random() * 280;
    G.parts.push({
      f: true, x: x + (Math.random() - 0.5) * 18, y: GROUND - 8,
      vx: Math.cos(a) * v * 0.6, vy: Math.sin(a) * v,
      r: 7 + Math.random() * 5, col: shades[i % shades.length],
      spin: Math.random() * 6.28, t: 0, life: 2.2 + Math.random() * 0.6
    });
  }
}

/* ---------- update ---------- */
function update(dt){
  if (!G || G.over) return;
  // power timers
  if (G.slowT > 0){ G.slowT -= dt; G.timeScale = 0.45; } else G.timeScale = 1;
  if (G.megaT > 0) G.megaT -= dt;
  if (G.shieldT > 0) G.shieldT -= dt;
  if (G.beamFx > 0) G.beamFx -= dt;
  if (G.comboT > 0){ G.comboT -= dt * G.timeScale; if (G.comboT <= 0) G.combo = 0; }  // slow-mo protects your combo
  if (G.shake > 0) G.shake = Math.max(0, G.shake - dt * 30);

  const ts = G.timeScale, sdt = dt * ts;

  // Red Alert ramp: tighter, faster, forever
  if (G.endless){
    G.endlessT += sdt;
    if (G.endlessT > G.nextRamp){
      G.nextRamp += 20;
      G.L.gap = Math.max(0.35, G.L.gap * 0.93);
      G.L.speed = Math.min(3, G.L.speed + 0.05);
    }
  }

  // spawn rockets (with a short incoming warning first) — always over the city
  const queueWarn = () => G.warns.push({ x: W * (0.16 + Math.random() * 0.68), type: pickType(), t: 0.7 });
  if (G.spawned < G.L.count){
    G.spawnT -= sdt;
    if (G.spawnT <= 0){
      queueWarn(); G.spawned++;
      // late-level mini barrages
      if (G.levelIdx >= 3 && Math.random() < 0.18 && G.spawned < G.L.count){
        queueWarn(); G.spawned++;
      }
      G.spawnT = G.L.gap * (0.85 + Math.random() * 0.3);   // steady cadence = hypnotic
    }
    // never leave the sky empty mid-level: the rhythm must not break
    if (!G.rockets.length && !G.warns.length) G.spawnT = Math.min(G.spawnT, 0.25);
  }
  for (let i = G.warns.length - 1; i >= 0; i--){
    const w = G.warns[i];
    w.t -= sdt;
    if (w.t <= 0){ G.warns.splice(i, 1); spawnRocket(w.type, w.x); }
  }
  // spawn powerups
  G.powT -= sdt;
  if (G.powT <= 0){ spawnPower(); G.powT = 9 + Math.random() * 8; }

  // rockets
  for (let i = G.rockets.length - 1; i >= 0; i--){
    const r = G.rockets[i];
    r.t += sdt * 6;
    let vx = r.vx;
    if (r.type === 3) vx += Math.sin(r.t) * 90;   // zigzag
    r.x += vx * sdt; r.y += r.vy * sdt;
    r.x = Math.max(W * 0.15, Math.min(W * 0.85, r.x));   // hard rule: never inside the 15% side margins
    r.trail.push({ x: r.x, y: r.y });
    if (r.trail.length > 14) r.trail.shift();
    // splitter splits
    if (r.split > 0 && r.y > r.split){
      G.rockets.splice(i, 1);
      G.resolved++;            // parent resolved (children added to count)
      G.L && (G.spawned += 1); // one extra child counts toward total seen
      spawnRocket(1, r.x - 8, r.y, true);
      spawnRocket(1, r.x + 8, r.y, true);
      burst(r.x, r.y, r.col, 8);
      continue;
    }
    // shield catch
    if (G.shieldT > 0 && r.y > GROUND - H * 0.22){
      G.rockets.splice(i, 1); killRocket(r); continue;
    }
    // iron sling auto-intercept of leakers
    if (G.sling > 0 && r.y > GROUND - 70){
      G.sling--;
      addFloat(r.x, r.y - 20, t('slingShot'), '#5dffa8', 16);
      G.rockets.splice(i, 1); killRocket(r); continue;
    }
    // ground / building impact
    if (r.y >= GROUND){
      G.rockets.splice(i, 1); G.resolved++;
      let hit = null;
      for (const b of G.buildings){
        if (b.alive && r.x > b.x - 6 && r.x < b.x + b.w + 6){ hit = b; break; }
      }
      if (hit){
        hit.hp--;
        if (hit.hp <= 0) hit.alive = false;
        else addFloat(r.x, GROUND - hit.h - 14, '🛡', '#3ee6ff', 14);   // armor absorbed it
        G.shake = 14; sfx.hitCity(); buzz([30, 40, 60]);
        burst(r.x, GROUND - 10, '#ff8c42', 30);
        falafelBurst(r.x, 10);
        if (!G.buildings.some(b => b.alive)){ endLevel(false); return; }
      } else {
        burst(r.x, GROUND, '#8da3cc', 8); noise(0.15, 0.1);
        falafelBurst(r.x, 8);
        G.shake = Math.max(G.shake, 4);
      }
      G.combo = 0;
    }
  }

  // interceptor streaks (cosmetic — the hit already registered on tap)
  for (let i = G.inters.length - 1; i >= 0; i--){
    const m = G.inters[i];
    m.t += dt;
    if (m.t > 0.22) G.inters.splice(i, 1);
  }

  // explosions
  for (let i = G.booms.length - 1; i >= 0; i--){
    const b = G.booms[i];
    b.t += dt; b.r = b.maxR * Math.min(1, b.t / 0.18);
    // kill rockets in radius — each blast may damage a given rocket only once,
    // or heavy armor (hp 2) dies to a single graze over consecutive frames.
    // Visual-only pops/duds (b.vis/b.dud) never damage.
    for (let j = G.rockets.length - 1; j >= 0 && !b.vis && !b.dud; j--){
      const r = G.rockets[j];
      if (r.lastBoom !== b && Math.hypot(r.x - b.x, r.y - b.y) < b.r + r.size){
        r.lastBoom = b;
        r.hp--;
        if (r.hp <= 0){ G.rockets.splice(j, 1); killRocket(r); }
        else { burst(r.x, r.y, '#ffffff', 6); r.vy *= 0.85; }
      }
    }
    if (b.t > 0.45) G.booms.splice(i, 1);
  }

  // power-ups falling
  for (let i = G.pows.length - 1; i >= 0; i--){
    const p = G.pows[i];
    p.t += sdt; p.y += p.vy * sdt; p.x += Math.sin(p.t * 2) * 12 * sdt;
    p.x = Math.max(W * 0.15, Math.min(W * 0.85, p.x));
    if (p.y > GROUND - 10) G.pows.splice(i, 1);
  }

  // particles & floats
  for (let i = G.parts.length - 1; i >= 0; i--){
    const p = G.parts[i];
    p.t += dt; p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += (p.f ? 700 : 200) * dt;
    if (p.f){
      p.spin += dt * 8;
      if (p.y > GROUND - p.r && p.vy > 0){          // bounce off the ground
        p.y = GROUND - p.r; p.vy *= -0.45; p.vx *= 0.7;
      }
    }
    if (p.t > p.life) G.parts.splice(i, 1);
  }
  for (let i = G.floats.length - 1; i >= 0; i--){
    const f = G.floats[i];
    f.t += dt; f.y -= 30 * dt;
    if (f.t > f.life) G.floats.splice(i, 1);
  }

  // level complete?
  if (G.spawned >= G.L.count && G.rockets.length === 0 && G.warns.length === 0 && !G.over){
    G.doneT += dt;
    if (G.doneT > 0.8) endLevel(true);
  }

  // HUD
  $('hudScore').textContent = G.score;
  $('hudCombo').textContent = G.combo >= 3 ? (t('comboX') + (1 + Math.min(4, Math.floor(G.combo / 3)) * 0.5)) : '';
  if (G.endless){
    const s = Math.floor(G.endlessT);
    $('hudWave').textContent = '🚨 ' + Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
    $('hudLevel').textContent = t('endlessName');
  } else {
    $('hudWave').textContent = Math.min(G.spawned, G.L.count) + '/' + G.L.count + ' ' + t('waveOf');
    $('hudLevel').textContent = t('level') + ' ' + (G.levelIdx + 1) + ' · ' + t('levels')[G.levelIdx];
  }
}

/* ---------- drawing ---------- */
function draw(){
  cx.save();
  if (G && G.shake > 0) cx.translate((Math.random() - 0.5) * G.shake, (Math.random() - 0.5) * G.shake);

  // sky
  const grad = cx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#060b18'); grad.addColorStop(0.65, '#0c1630'); grad.addColorStop(1, '#14224a');
  cx.fillStyle = grad; cx.fillRect(-20, -20, W + 40, H + 40);

  // stars
  cx.fillStyle = 'rgba(234,242,255,0.7)';
  for (const s of stars){
    cx.globalAlpha = 0.3 + 0.5 * Math.abs(Math.sin(s.tw + performance.now() / 900));
    cx.fillRect(s.x * W, s.y * H * 0.7, s.s, s.s);
  }
  cx.globalAlpha = 1;

  if (G){
    cx.drawImage(BD, 0, 0, W, H);
    drawCity();
    drawShield();
    drawEntities();
  }
  cx.restore();
}

function drawCity(){
  const acc = G.L.accent;
  // ground
  cx.fillStyle = '#0a1226';
  cx.fillRect(-20, GROUND, W + 40, H - GROUND + 20);
  cx.strokeStyle = 'rgba(62,230,255,0.35)'; cx.lineWidth = 2;
  cx.beginPath(); cx.moveTo(0, GROUND); cx.lineTo(W, GROUND); cx.stroke();

  // buildings
  for (const b of G.buildings){
    if (b.alive){
      cx.fillStyle = '#3a5cae';
      cx.fillRect(b.x, GROUND - b.h, b.w, b.h);
      cx.fillStyle = '#16244a';
      cx.fillRect(b.x, GROUND - b.h, b.w, 4);   // roof line for definition
      cx.fillStyle = acc; cx.globalAlpha = 0.95;
      // windows
      const rows = Math.floor(b.h / 16), cols = b.win;
      for (let r = 0; r < rows; r++)
        for (let c = 0; c < cols; c++)
          if ((r * 7 + c * 3 + b.win) % 3 !== 0)
            cx.fillRect(b.x + 5 + c * (b.w - 10) / cols, GROUND - b.h + 6 + r * 16, 4, 6);
      cx.globalAlpha = 1;
    } else {
      // rubble
      cx.fillStyle = '#26314f';
      cx.beginPath();
      cx.moveTo(b.x, GROUND);
      cx.lineTo(b.x + b.w * 0.2, GROUND - 12);
      cx.lineTo(b.x + b.w * 0.5, GROUND - 6);
      cx.lineTo(b.x + b.w * 0.8, GROUND - 14);
      cx.lineTo(b.x + b.w, GROUND);
      cx.fill();
    }
  }

  // launcher battery
  const lx = W / 2;
  cx.fillStyle = '#22417f';
  cx.beginPath();
  cx.moveTo(lx - 22, GROUND); cx.lineTo(lx - 12, GROUND - 22);
  cx.lineTo(lx + 12, GROUND - 22); cx.lineTo(lx + 22, GROUND); cx.fill();
  cx.fillStyle = '#3ee6ff';
  cx.fillRect(lx - 3, GROUND - 34, 6, 14);
  cx.globalAlpha = 0.35;
  cx.beginPath(); cx.arc(lx, GROUND - 20, 30, Math.PI, 0); cx.strokeStyle = '#3ee6ff'; cx.stroke();
  cx.globalAlpha = 1;

  // (no ammo pips: every tap fires instantly in the direct-hit model)
  // sling charges
  for (let i = 0; i < G.sling; i++){
    cx.fillStyle = '#5dffa8';
    cx.beginPath(); cx.arc(20 + i * 16, GROUND + 14, 4, 0, 6.29); cx.fill();
  }
}

function drawShield(){
  if (G.shieldT <= 0) return;
  const a = Math.min(1, G.shieldT);
  cx.globalAlpha = 0.18 * a + 0.06 * Math.sin(performance.now() / 120);
  cx.fillStyle = '#3ee6ff';
  cx.beginPath();
  cx.ellipse(W / 2, GROUND, W * 0.52, H * 0.24, 0, Math.PI, 0);
  cx.fill();
  cx.globalAlpha = 0.7 * a;
  cx.strokeStyle = '#3ee6ff'; cx.lineWidth = 2;
  cx.beginPath();
  cx.ellipse(W / 2, GROUND, W * 0.52, H * 0.24, 0, Math.PI, 0);
  cx.stroke();
  cx.globalAlpha = 1;
}

function drawEntities(){
  // iron beam: an actual beam sweeping the sky, with a gentle (photosensitivity-safe) flash
  if (G.beamFx > 0){
    cx.globalAlpha = Math.min(0.22, G.beamFx * 0.5);
    cx.fillStyle = '#fff'; cx.fillRect(0, 0, W, H);
    const p = 1 - G.beamFx / 0.5;                 // sweep left → right over the burst
    const bx = W * p;
    const col = cx.createLinearGradient(bx - 16, 0, bx + 16, 0);
    col.addColorStop(0, 'rgba(62,230,255,0)');
    col.addColorStop(0.5, 'rgba(255,255,255,0.9)');
    col.addColorStop(1, 'rgba(62,230,255,0)');
    cx.globalAlpha = Math.min(1, G.beamFx * 3);
    cx.fillStyle = col;
    cx.fillRect(bx - 16, 0, 32, GROUND);
    cx.globalAlpha = 1;
  }

  // incoming warnings (pulsing chevrons at the top edge)
  for (const w of G.warns){
    const pulse = 0.45 + 0.55 * Math.abs(Math.sin(performance.now() / 110));
    cx.globalAlpha = pulse;
    cx.shadowColor = '#ff5d73'; cx.shadowBlur = 12;
    cx.fillStyle = '#ff5d73';
    cx.beginPath();
    cx.moveTo(w.x, 30); cx.lineTo(w.x - 11, 12); cx.lineTo(w.x + 11, 12);
    cx.closePath(); cx.fill();
    cx.shadowBlur = 0; cx.globalAlpha = 1;
  }

  // rockets: smoke trail, body with nose cone + fins, flickering exhaust
  for (const r of G.rockets){
    const s = r.size;
    for (let i = 0; i < r.trail.length; i++){
      const p = r.trail[i], k = i / r.trail.length;
      cx.globalAlpha = 0.04 + k * 0.16;
      cx.fillStyle = '#aeb9d6';
      cx.beginPath(); cx.arc(p.x, p.y, s * (0.7 - k * 0.45), 0, 6.29); cx.fill();
    }
    cx.globalAlpha = 1;
    const a = Math.atan2(r.vy, r.type === 3 ? r.vx + Math.sin(r.t) * 90 : r.vx);
    cx.save(); cx.translate(r.x, r.y); cx.rotate(a + Math.PI / 2);
    // exhaust flame (flickers)
    const fl = s * (0.9 + Math.random() * 0.6);
    cx.fillStyle = '#ff9d3c'; cx.globalAlpha = 0.9;
    cx.beginPath();
    cx.moveTo(-s * 0.28, s * 0.62); cx.lineTo(s * 0.28, s * 0.62); cx.lineTo(0, s * 0.62 + fl);
    cx.closePath(); cx.fill();
    cx.fillStyle = '#ffe79a';
    cx.beginPath();
    cx.moveTo(-s * 0.13, s * 0.62); cx.lineTo(s * 0.13, s * 0.62); cx.lineTo(0, s * 0.62 + fl * 0.55);
    cx.closePath(); cx.fill();
    cx.globalAlpha = 1;
    // body + glow
    cx.shadowColor = r.col; cx.shadowBlur = 16;
    cx.fillStyle = r.col;
    cx.fillRect(-s * 0.32, -s * 0.35, s * 0.64, s);   // fuselage
    cx.beginPath();                                    // nose cone
    cx.moveTo(-s * 0.32, -s * 0.35); cx.lineTo(s * 0.32, -s * 0.35); cx.lineTo(0, -s);
    cx.closePath(); cx.fill();
    cx.beginPath();                                    // fins
    cx.moveTo(-s * 0.32, s * 0.3); cx.lineTo(-s * 0.62, s * 0.75); cx.lineTo(-s * 0.32, s * 0.65);
    cx.moveTo(s * 0.32, s * 0.3); cx.lineTo(s * 0.62, s * 0.75); cx.lineTo(s * 0.32, s * 0.65);
    cx.closePath(); cx.fill();
    cx.shadowBlur = 0;
    cx.fillStyle = 'rgba(255,255,255,0.85)';           // glint on the tip
    cx.beginPath(); cx.arc(0, -s * 0.78, s * 0.13, 0, 6.29); cx.fill();
    cx.fillStyle = 'rgba(255,255,255,0.25)';           // body highlight stripe
    cx.fillRect(-s * 0.32, -s * 0.35, s * 0.16, s);
    cx.restore();
    if (r.type === 2 && r.hp > 1){   // heavy armor ring
      cx.strokeStyle = '#fff'; cx.globalAlpha = 0.6; cx.lineWidth = 2;
      cx.beginPath(); cx.arc(r.x, r.y, s + 5, 0, 6.29); cx.stroke();
      cx.globalAlpha = 1;
    }
  }

  // interceptor streaks: an instant zip from battery to the tapped rocket,
  // racing up the line then fading — the dome answering your finger
  for (const m of G.inters){
    const k = Math.min(1, m.t / 0.22);
    const head = Math.min(1, m.t / 0.08);          // tip races up in the first 80ms
    const hx = m.x1 + (m.x2 - m.x1) * head, hy = m.y1 + (m.y2 - m.y1) * head;
    cx.globalAlpha = 1 - k;
    cx.strokeStyle = '#3ee6ff'; cx.lineWidth = 2.5;
    cx.shadowColor = '#3ee6ff'; cx.shadowBlur = 12;
    cx.beginPath(); cx.moveTo(m.x1, m.y1); cx.lineTo(hx, hy); cx.stroke();
    cx.fillStyle = '#eaffff';
    cx.beginPath(); cx.arc(hx, hy, 4.5, 0, 6.29); cx.fill();
    cx.shadowBlur = 0; cx.globalAlpha = 1;
  }

  // explosions: hot radial core, neon ring (chain blasts glow gold)
  for (const b of G.booms){
    const k = b.t / 0.45;
    cx.globalAlpha = 1 - k;
    const core = cx.createRadialGradient(b.x, b.y, 0, b.x, b.y, Math.max(2, b.r * 0.5));
    core.addColorStop(0, '#ffffff');
    core.addColorStop(0.45, 'rgba(255,209,102,0.55)');
    core.addColorStop(1, 'rgba(255,140,66,0)');
    cx.fillStyle = core;
    cx.beginPath(); cx.arc(b.x, b.y, b.r * 0.5, 0, 6.29); cx.fill();
    const ringCol = b.dud ? 'rgba(141,163,204,0.8)' : b.chain ? '#ffd166' : '#3ee6ff';
    cx.strokeStyle = ringCol; cx.lineWidth = b.dud ? 1.5 : 3;
    cx.shadowColor = ringCol; cx.shadowBlur = b.dud ? 0 : 18;
    cx.beginPath(); cx.arc(b.x, b.y, b.r, 0, 6.29); cx.stroke();
    cx.shadowBlur = 0;
    cx.strokeStyle = '#ffd166'; cx.lineWidth = 1.5; cx.globalAlpha = (1 - k) * 0.7;
    cx.beginPath(); cx.arc(b.x, b.y, b.r * 0.75, 0, 6.29); cx.stroke();
    cx.globalAlpha = 1;
  }

  // particles (sparks + falafel balls)
  for (const p of G.parts){
    cx.globalAlpha = Math.min(1, (1 - p.t / p.life) * 1.4);
    if (p.f){
      cx.fillStyle = p.col;
      cx.beginPath(); cx.arc(p.x, p.y, p.r, 0, 6.29); cx.fill();
      cx.strokeStyle = '#7a5a22'; cx.lineWidth = 1.5;
      cx.stroke();
      cx.fillStyle = 'rgba(70,48,18,0.8)';           // crispy speckles
      cx.beginPath();
      cx.arc(p.x + Math.cos(p.spin) * p.r * 0.4, p.y + Math.sin(p.spin) * p.r * 0.4, p.r * 0.22, 0, 6.29);
      cx.arc(p.x - Math.cos(p.spin * 1.7) * p.r * 0.35, p.y - Math.sin(p.spin * 1.7) * p.r * 0.35, p.r * 0.18, 0, 6.29);
      cx.fill();
      cx.fillStyle = 'rgba(120,220,120,0.6)';        // parsley fleck
      cx.fillRect(p.x + Math.sin(p.spin) * p.r * 0.3, p.y - p.r * 0.3, 1.6, 1.6);
    } else {
      cx.fillStyle = p.col;
      cx.fillRect(p.x - 2, p.y - 2, 4, 4);
    }
  }
  cx.globalAlpha = 1;

  // power-ups
  cx.textAlign = 'center'; cx.textBaseline = 'middle';
  for (const p of G.pows){
    // parachute
    cx.strokeStyle = 'rgba(234,242,255,0.8)'; cx.lineWidth = 1.5;
    cx.beginPath(); cx.arc(p.x, p.y - 22, 16, Math.PI, 0); cx.stroke();
    cx.beginPath();
    cx.moveTo(p.x - 16, p.y - 22); cx.lineTo(p.x, p.y - 4);
    cx.moveTo(p.x + 16, p.y - 22); cx.lineTo(p.x, p.y - 4);
    cx.stroke();
    cx.shadowColor = '#ffd166'; cx.shadowBlur = 14;
    cx.font = '26px serif';
    cx.fillText(p.ic, p.x, p.y + 8);
    cx.shadowBlur = 0;
  }

  // floats
  for (const f of G.floats){
    cx.globalAlpha = 1 - f.t / f.life;
    cx.fillStyle = f.col;
    cx.font = '700 ' + f.sz + 'px "Courier New", monospace';
    cx.shadowColor = f.col; cx.shadowBlur = 10;
    cx.fillText(f.txt, f.x, f.y);
    cx.shadowBlur = 0;
  }
  cx.globalAlpha = 1;
}

/* ---------- main loop ---------- */
function loop(ts){
  requestAnimationFrame(loop);
  // clamp dt to a sane positive range — protects against timestamp jumps
  // (tab restore, clock changes) freezing cooldowns or rewinding physics
  const dt = Math.min(0.05, Math.max(0.0005, (ts - lastFrame) / 1000)) || 0.016;
  lastFrame = ts;
  if (screen === 'play') update(dt);
  draw();
}

/* ---------- screens / flow ---------- */
const SCREENS = ['scrMenu','scrHow','scrCal','scrIntro','scrPause','scrEnd','scrOver','scrWin'];
function show(name){
  for (const s of SCREENS) $(s).classList.remove('show');
  $('hud').style.display = 'none';
  if (name === 'play'){ $('hud').style.display = 'flex'; }
  else if (name) $(name).classList.add('show');
  screen = ({ scrMenu:'menu', scrHow:'how', scrCal:'cal', scrIntro:'intro', scrPause:'pause',
              scrEnd:'end', scrOver:'over', scrWin:'win' })[name] || 'play';
}

function gotoIntro(idx){
  curLevel = idx;
  $('hudLevelIntro').textContent = t('level') + ' ' + (idx + 1) + ' / ' + LEVELS.length;
  $('levelTitle').textContent = '📍 ' + t('levels')[idx];
  $('levelHint').textContent = t('hints')[idx];
  show('scrIntro');
}

let curMode = 'campaign';
function startLevel(){
  newGame(curLevel, curMode === 'endless');
  show('play');
  if (curLevel === 0 && curMode !== 'endless')
    addFloat(W / 2, H * 0.32, t('tapHint'), '#ffd166', 17, 3);
  if (!trackedPlay){ trackedPlay = true; track('play'); }     // one per session
}

function endLevel(won){
  G.over = true; G.won = won;
  const total = G.spawned;
  const pct = total ? G.killed / total : 0;
  const alive = G.buildings.filter(b => b.alive).length;

  if (!won){
    save.best = Math.max(save.best, G.score);
    const consolation = Math.round(G.score * 0.3);
    save.coins += consolation;
    persist();
    $('overScore').textContent = G.score;
    $('overStats').textContent = t('overStats').replace('{n}', G.killed) +
      (G.endless ? ' · 🚨 ' + Math.floor(G.endlessT) + 's' : '');
    renderShop($('shopOver'), $('coinsOver'));     // the stuck player needs the shop MOST
    show('scrOver');
    return;
  }

  const st = pct >= 0.9 && alive === G.buildings.length ? 3 : pct >= 0.75 ? 2 : 1;
  const replay = save.unlocked > curLevel;          // re-clearing an old level pays a quarter
  const coinGain = Math.round((G.score + alive * 20) * (replay ? 0.25 : 1));
  save.coins += coinGain;
  save.best = Math.max(save.best, G.score);
  save.unlocked = Math.max(save.unlocked, curLevel + 1);
  persist();

  $('endStars').textContent = '★'.repeat(st) + '☆'.repeat(3 - st);
  $('endTitle').textContent = t('cleared') + ' — ' + t('levels')[curLevel];
  $('endStats').innerHTML =
    t('intercepted') + ': <b>' + G.killed + '/' + total + '</b> · ' +
    t('saved') + ': <b>' + alive + '/' + G.buildings.length + '</b><br>' +
    t('scoreW') + ': <b>' + G.score + '</b> (+' + coinGain + ' 🪙)';
  renderShop();
  if (curLevel + 1 >= LEVELS.length){
    $('btnNext').textContent = '🏆';
    $('winScore').textContent = t('scoreW') + ': ' + G.score + ' · ' + t('bestW') + ': ' + save.best;
  } else {
    $('btnNext').textContent = t('next');
  }
  show('scrEnd');
}

function renderShop(container, coinsEl){
  const shop = container || $('shop');
  const cEl = coinsEl || $('coins');
  cEl.textContent = '🪙 ' + save.coins + ' ' + t('coinsW');
  shop.innerHTML = '';
  for (const u of UPGRADES){
    const lvl = save.up[u.key];
    const row = document.createElement('div');
    row.className = 'up';
    const cost = lvl < u.max ? u.cost[lvl] : null;
    row.innerHTML =
      '<div class="ic">' + u.ic + '</div>' +
      '<div class="info"><div class="nm">' + t(u.nm) + '</div>' +
      '<div class="ds">' + t(u.ds) + '</div>' +
      '<div class="tiers">' + '◆'.repeat(lvl) + '◇'.repeat(u.max - lvl) + '</div></div>' +
      '<button ' + (cost === null || cost > save.coins ? 'disabled' : '') + '>' +
      (cost === null ? t('maxed') : '🪙 ' + cost) + '</button>';
    row.querySelector('button').onclick = () => {
      const cur = save.up[u.key];                      // re-derive: never trust render-time cost
      if (cur < u.max && save.coins >= u.cost[cur]){
        save.coins -= u.cost[cur]; save.up[u.key]++; persist(); sfx.power();
        renderShop(shop, cEl);
      }
    };
    shop.appendChild(row);
  }
}

/* ---------- language & settings ---------- */
function applyLang(){
  const L = T[save.lang];
  document.documentElement.lang = save.lang;
  document.documentElement.dir = L.dir;
  $('btnLang').textContent = save.lang === 'he' ? 'EN' : 'עב';
  document.querySelector('#scrMenu h1').innerHTML =
    save.lang === 'he' ? 'כיפת ברזל<small>IRON DOME</small>' : 'IRON DOME<small>כיפת ברזל</small>';
  const map = {
    tagline: '.sub[data-i18n="tagline"]', disclaimer: '[data-i18n="disclaimer"]',
    howTitle: '[data-i18n="howTitle"]', how1: '[data-i18n="how1"]', how2: '[data-i18n="how2"]',
    how3: '[data-i18n="how3"]', how4: '[data-i18n="how4"]', how5: '[data-i18n="how5"]',
    paused: '[data-i18n="paused"]', overTitle: '[data-i18n="overTitle"]',
    calTitle: '[data-i18n="calTitle"]',
    winTitle: '[data-i18n="winTitle"]', winSub: '[data-i18n="winSub"]'
  };
  for (const k in map){
    const el = document.querySelector(map[k]);
    if (el) el.textContent = t(k);
  }
  $('btnPlay').textContent = t('play');
  $('btnHow').textContent = t('howBtn');
  $('btnCal').textContent = '🎯 ' + t('calTitle');
  $('btnCalSkip').textContent = t('skip');
  $('btnEndless').textContent = t('endless');
  $('btnEndless').style.display = save.unlocked >= LEVELS.length ? '' : 'none';
  $('btnHowBack').textContent = t('back');
  $('btnStart').textContent = t('start');
  $('btnResume').textContent = t('resume');
  $('btnQuit').textContent = t('quit');
  $('btnNext').textContent = t('next');
  $('btnRetry').textContent = t('retry');
  $('btnRetry2').textContent = t('retry');
  $('btnMenu1').textContent = t('menu');
  $('btnMenu2').textContent = t('menu');
  $('btnMenu3').textContent = t('menu');
  $('menuBest').textContent = save.best > 0 ? (t('bestW') + ': ' + save.best + ' · 🪙 ' + save.coins) : '';
}

/* ---------- touch calibration ----------
   3 guided taps measure the player's systematic touch offset (thumbs
   consistently land below/beside what the eye targets); a 4th step teaches
   the fling. The averaged offset corrects every future game tap. */
const CALPOS = [[0.30, 0.32], [0.70, 0.28], [0.50, 0.50], [0.50, 0.36]];
let calState = null, calDown = null;
function startCal(after){
  calState = { step: 0, offs: [], after: after || 'menu' };
  show('scrCal');
  calPlace();
}
function calPlace(){
  const p = CALPOS[calState.step], el = $('calTarget');
  el.style.display = 'block';
  el.style.left = (p[0] * W - 32) + 'px';
  el.style.top = (p[1] * H - 32) + 'px';
  $('calMsg').textContent = calState.step < 3 ? t('calTapMsg') : t('calFlingMsg');
  $('calStep').textContent = (calState.step + 1) + ' / 4';
}
function calRoute(after){
  if (after === 'play') gotoIntro(Math.min(save.unlocked, LEVELS.length - 1));
  else { applyLang(); show('scrMenu'); }
}
function calFinish(){
  let ax = 0, ay = 0;
  for (const o of calState.offs){ ax += o.dx; ay += o.dy; }
  ax /= calState.offs.length; ay /= calState.offs.length;
  const clamp = v => Math.max(-48, Math.min(48, Math.round(-v)));
  save.cal = { x: clamp(ax), y: clamp(ay), done: true };
  persist();
  $('calTarget').style.display = 'none';
  $('calMsg').textContent = t('calDoneMsg');
  $('calStep').textContent = '✓';
  sfx.power(); buzz(30);
  const after = calState.after; calState = null;
  setTimeout(() => calRoute(after), 1100);
}
$('scrCal').addEventListener('pointerdown', e => {
  if (calState) calDown = { x: e.clientX, y: e.clientY };
});
$('scrCal').addEventListener('pointerup', e => {
  if (!calState || !calDown) return;
  const p = CALPOS[calState.step];
  const cxp = p[0] * W, cyp = p[1] * H;
  const moved = Math.hypot(e.clientX - calDown.x, e.clientY - calDown.y);
  if (calState.step < 3){
    if (moved > 24){ calDown = null; return; }              // that was a swipe, not a tap
    const dx = calDown.x - cxp, dy = calDown.y - cyp;
    if (Math.hypot(dx, dy) > 140){ $('calMsg').textContent = t('calCloser'); calDown = null; return; }
    calState.offs.push({ dx, dy });
    calState.step++; sfx.click(); buzz(10);
    calPlace();
  } else {
    if (moved < 30){ $('calMsg').textContent = t('calFlingMsg'); calDown = null; return; }
    calFinish();
  }
  calDown = null;
});
$('btnCalSkip').onclick = () => {
  save.cal = { x: 0, y: 0, done: true }; persist();
  const after = calState ? calState.after : 'menu'; calState = null;
  calRoute(after);
};

/* ---------- wire buttons ---------- */
$('btnPlay').onclick = () => {
  ac(); sfx.click(); curMode = 'campaign';
  if (!save.cal.done) startCal('play');           // first run: calibrate, then play
  else gotoIntro(Math.min(save.unlocked, LEVELS.length - 1));
};
$('btnEndless').onclick = () => {
  ac(); sfx.click(); curMode = 'endless';
  curLevel = LEVELS.length - 1;                   // endless uses late-game rules (snap, barrages)
  startLevel();
};
$('btnCal').onclick = () => { ac(); sfx.click(); startCal('menu'); };
$('btnHow').onclick = () => { sfx.click(); show('scrHow'); };
$('btnHowBack').onclick = () => { sfx.click(); show('scrMenu'); };
$('btnStart').onclick = () => { ac(); sfx.click(); startLevel(); };
$('btnPause').onclick = () => { sfx.click(); show('scrPause'); };
$('btnResume').onclick = () => { sfx.click(); show('play'); };
$('btnQuit').onclick = () => {
  sfx.click();
  if (G && !G.over && G.score > 0){               // leaving mid-level still banks your coins
    save.coins += Math.round(G.score * 0.3);
    save.best = Math.max(save.best, G.score);
    persist();
  }
  applyLang(); show('scrMenu');
};
$('btnNext').onclick = () => {
  sfx.click();
  if (curLevel + 1 >= LEVELS.length){ track('won'); show('scrWin'); }
  else gotoIntro(curLevel + 1);
};
$('btnRetry').onclick = () => { sfx.click(); startLevel(); };   // one tap back into the fight
$('btnRetry2').onclick = () => { sfx.click(); startLevel(); };
$('btnMenu1').onclick = $('btnMenu2').onclick = $('btnMenu3').onclick =
  () => { sfx.click(); applyLang(); show('scrMenu'); };
$('btnLang').onclick = () => {
  save.lang = save.lang === 'he' ? 'en' : 'he'; persist(); applyLang(); sfx.click();
};
function syncSound(){
  for (const id of ['btnSound', 'btnSound2']){
    $(id).textContent = save.sound ? '🔊' : '🔇';
    $(id).classList.toggle('on', save.sound);
  }
}
$('btnSound').onclick = $('btnSound2').onclick = () => {
  save.sound = !save.sound; persist(); syncSound();
  if (save.sound) sfx.click();
};

/* auto-pause when tab hidden */
document.addEventListener('visibilitychange', () => {
  if (document.hidden && screen === 'play') show('scrPause');
});

/* ---------- boot ---------- */
for (let i = 0; i < 70; i++)
  stars.push({ x: Math.random(), y: Math.random(), s: Math.random() < 0.8 ? 1 : 2, tw: Math.random() * 6.28 });
resize();
syncSound();
applyLang();
requestAnimationFrame(loop);

/* ---------- analytics (GoatCounter: free, cookieless, fails silently) ----------
   Dashboard: https://irondome.goatcounter.com — counts visits, plays,
   wins, and PWA installs. No personal data, no cookies, no consent needed. */
function track(event){
  try{
    if (location.protocol === 'file:' || location.hostname === 'localhost') return;
    const img = new Image(1, 1);
    img.src = 'https://irondome.goatcounter.com/count?' +
      'p=' + encodeURIComponent(event ? '/' + event : location.pathname) +
      (event ? '&e=true' : '') +
      '&r=' + encodeURIComponent(document.referrer) +
      '&rnd=' + Date.now();
  }catch(e){}
}
track();                                                      // visit
let trackedPlay = false;
window.addEventListener('appinstalled', () => track('pwa-install'));   // "download"
if (window.matchMedia && matchMedia('(display-mode: standalone)').matches)
  track('app-open');                                          // opened from home screen

/* ---------- PWA ---------- */
if ('serviceWorker' in navigator)
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
</script>
